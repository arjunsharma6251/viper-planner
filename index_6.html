/**
 * Look up a course's full metadata. Returns null if unknown.
 */
function lookupCourse(code) { return COURSES[code] || null; }

/**
 * Expand a course code into a placement-ready entry with default values.
 */
function courseEntry(code, overrides = {}) {
  const base = lookupCourse(code);
  if (!base) {
    console.warn(`Unknown course: ${code}`);
    return { code, title: code, cu: 1, off: BOTH, ...overrides };
  }
  return {
    code,
    title: base.title,
    cu: base.cu,
    off: base.off,
    prereqs: base.prereqs || [],
    coreqs: base.coreqs || [],
    fa: base.fa || null,
    sec: base.sec || null,
    energy: !!base.energy,
    isThermo: !!base.isThermo,
    isWritSem: !!base.isWritSem,
    note: base.note || null,
    ...overrides,
  };
}

/**
 * Compute human-readable labels for each semester.
 * If gradYear is supplied, returns real calendar labels like "Fall 2024".
 * Otherwise returns generic "Year 1 Fall" style.
 */
function semesterLabel(semKey, gradYear) {
  const [season, yr] = semKey.split('-');
  const yearNum = parseInt(yr.slice(1));
  const seasonLabel = season === 'fall' ? 'Fall' : 'Spring';
  if (gradYear && gradYear >= 2020 && gradYear <= 2040) {
    const calYear = gradYear - 4 + yearNum - 1 + (season === 'spring' ? 1 : 0);
    return { year: `Year ${yearNum}`, season: `${seasonLabel} ${calYear}`, short: `${seasonLabel.slice(0, 2)} '${String(calYear).slice(2)}` };
  }
  return { year: `Year ${yearNum}`, season: seasonLabel, short: `Y${yearNum}${seasonLabel[0]}` };
}

/* ============================================================================
   SECTION 2: SCHEDULER MODULE

   A pipeline of pure functions. Each transforms a Plan and returns a new one.
   buildPlan() composes them in order.

   Plan shape:
   {
     semesters: { [semKey]: Course[] },   // placed courses per semester
     loads:     { [semKey]: number },     // summed CU per semester
     placement: { [code]: semKey|'credit' }, // tracks where each course sits
     summary:   { ... },                  // progress metrics (computed at end)
     meta:      { sasMajor, seasMajor, overrides, creditFlags }
   }
   ============================================================================ */

(function() {
  const D = window.DATA;
  const { COURSES, MAJORS, VIPER_PROGRAM, AP_CREDITS, GENED_POOL, GENED_SLOTS, SECTOR_VI_FALLBACK,
          FA_REQUIREMENTS, SECTORS, SEMESTER_KEYS, isFallSem, courseEntry,
          FALL, SPRING, BOTH } = D;

  // ---- Load targets ----
  const TARGET_MIN = 4.5;
  const TARGET_IDEAL = 5.5;
  const TARGET_MAX = 6.5;
  const TARGET_HARD_CAP = 7.5;

  // ========= Pure helper functions =========

  function roundCU(n) { return Math.round(n * 10) / 10; }

  /**
   * Create an empty plan structure.
   */
  function emptyPlan(meta = {}) {
    const semesters = {}, loads = {};
    for (const k of SEMESTER_KEYS) { semesters[k] = []; loads[k] = 0; }
    return { semesters, loads, placement: {}, meta, notes: [] };
  }

  /**
   * Check if a course can be placed in a given semester.
   */
  function canPlaceInSemester(course, semKey) {
    if (course.off === FALL && !isFallSem(semKey)) return false;
    if (course.off === SPRING && isFallSem(semKey)) return false;
    return true;
  }

  /**
   * Determine the earliest semester index at which all prereqs are met.
   * Returns -1 if the course has no prereqs, a valid index (0-7), or null
   * if some prereq isn't scheduled yet.
   */
  function earliestAllowedIdx(course, placement) {
    if (!course.prereqs || course.prereqs.length === 0) return 0;
    let latest = -1;
    for (const p of course.prereqs) {
      const where = placement[p];
      if (where === 'credit') continue;
      if (where === undefined) return null;
      const idx = SEMESTER_KEYS.indexOf(where);
      if (idx > latest) latest = idx;
    }
    return latest + 1;
  }

  /**
   * Add a course to a semester, updating all affected plan state.
   */
  function addCourse(plan, semKey, entry) {
    plan.semesters[semKey].push(entry);
    plan.loads[semKey] = roundCU(plan.loads[semKey] + entry.cu);
    plan.placement[entry.code] = semKey;
    return plan;
  }

  /**
   * Find the best semester for a course: earliest available that fits.
   */
  function findBestSemester(course, plan, earliestIdx = 0, maxLoad = TARGET_MAX) {
    for (let i = earliestIdx; i < SEMESTER_KEYS.length; i++) {
      const key = SEMESTER_KEYS[i];
      if (!canPlaceInSemester(course, key)) continue;
      if ((plan.loads[key] || 0) + course.cu <= maxLoad) return key;
    }
    return null;
  }

  /**
   * Find semester with lowest load that still fits the course.
   */
  function findLightestFitting(course, plan, earliestIdx = 0, maxLoad = TARGET_HARD_CAP) {
    let best = null, bestLoad = Infinity;
    for (let i = earliestIdx; i < SEMESTER_KEYS.length; i++) {
      const key = SEMESTER_KEYS[i];
      if (!canPlaceInSemester(course, key)) continue;
      const load = plan.loads[key] || 0;
      if (load + course.cu <= maxLoad && load < bestLoad) {
        best = key; bestLoad = load;
      }
    }
    return best;
  }

  // ========= Pipeline stages =========

  /**
   * STAGE 1: Resolve AP/placement credit into the plan's placement map.
   */
  function applyCredits(plan, apCreditIds, { sasMajorKey, seasMajorKey }) {
    const flags = new Set();
    for (const id of apCreditIds) {
      const cred = AP_CREDITS.find(c => c.id === id);
      if (!cred) continue;
      for (const g of cred.grants) {
        if (g === 'LANG_FL' || g === 'STAT_WAIVER' || g === 'EAS_0091') {
          flags.add(g);
        } else {
          // Refuse AP-Chem-based credit for CHEM/CBE majors
          if ((g === 'CHEM 1012' || g === 'CHEM 1022') &&
              (seasMajorKey === 'CBE' || sasMajorKey === 'CHEM') &&
              id === 'ap-chem') {
            plan.notes.push({
              level: 'warning', src: 'AP Chem',
              text: `AP Chemistry (EAS 0091) is not accepted by ${sasMajorKey === 'CHEM' ? 'CHEM' : 'CBE'}. Use the Penn CHEM placement exam instead.`,
            });
            continue;
          }
          plan.placement[g] = 'credit';
        }
      }
    }
    plan.meta.creditFlags = flags;
    return plan;
  }

  /**
   * STAGE 2: Place fixed VIPER courses (VIPR 1200, 1210, 1300×6).
   */
  function placeVIPER(plan) {
    for (const v of VIPER_PROGRAM.fixedCourses) {
      addCourse(plan, v.semKey, {
        code: v.code, title: v.title, cu: v.cu,
        category: 'viper', tags: ['VIPER'],
        note: v.note || null, fixed: true,
      });
    }
    return plan;
  }

  /**
   * STAGE 3: Inject thermodynamics course if MATH+CIS combo requires it.
   */
  function injectThermoIfNeeded(plan, { sasMajorKey, seasMajorKey }) {
    if (sasMajorKey !== 'MATH' || seasMajorKey !== 'CIS') return plan;
    // PHYS 1230 is the default choice (smallest footprint)
    plan.meta.requiredThermo = 'PHYS 1230';
    plan.notes.push({
      level: 'policy', src: 'VIPER',
      text: `MATH+CIS combo requires one thermodynamics course. PHYS 1230 added by default — may be swapped for MEAM 2030, MSE 2600, or CHEM 2220.`,
    });
    return plan;
  }

  /**
   * STAGE 4: Compute the merged core course list across both majors.
   * Courses shared by both majors appear once and are marked as double-counts.
   */
  function collectCoreCourses(plan, { sasMajor, seasMajor, sasConc, seasConc }) {
    const sasCodes = [
      ...sasMajor.sharedCore,
      ...(sasConc.extraCore || []),
    ];
    const seasCodes = [
      ...seasMajor.sharedCore,
      ...(seasConc.extraCore || []),
    ];
    // Inject thermo for MATH+CIS
    if (plan.meta.requiredThermo && !sasCodes.includes(plan.meta.requiredThermo) && !seasCodes.includes(plan.meta.requiredThermo)) {
      sasCodes.push(plan.meta.requiredThermo);
    }

    const seen = new Map();
    const doubleCounted = new Set();
    for (const code of sasCodes) {
      seen.set(code, { code, sas: true, seas: false });
    }
    for (const code of seasCodes) {
      if (seen.has(code)) {
        seen.get(code).seas = true;
        doubleCounted.add(code);
      } else {
        seen.set(code, { code, sas: false, seas: true });
      }
    }

    plan.meta.coreCodes = Array.from(seen.values());
    plan.meta.doubleCounted = doubleCounted;
    return plan;
  }

  /**
   * STAGE 5: Place all merged core courses.
   *
   * Three-phase placement:
   *   Phase 1 — honor sample schedule (Penn's recommended semester) for courses
   *             that have one. Relaxed prereq check: we trust Penn's own ordering,
   *             which implicitly handles coreqs (e.g., CBE 2310 + CBE 3500 same term).
   *   Phase 2 — prereq-based iterative placement for courses without sample-schedule
   *             entries (uncommon once all majors have schedules defined).
   *   Phase 3 — force-place any stragglers in the lightest available semester.
   */
  function placeCoreCourses(plan) {
    // Build unified sample-schedule map — earliest preferred semester wins.
    // Custom placements (from drag-drop) override the sample schedule.
    const { sasMajor, seasMajor, sasConc, seasConc, customPlacements = {} } = plan.meta;
    const preferredSem = {};
    const mergeSchedule = (sched) => {
      if (!sched) return;
      for (const [code, sem] of Object.entries(sched)) {
        if (!preferredSem[code] || semBeforeOrEqual(sem, preferredSem[code])) {
          preferredSem[code] = sem;
        }
      }
    };
    mergeSchedule(sasMajor.sampleSchedule);
    mergeSchedule(sasConc.sampleSchedule);
    mergeSchedule(seasMajor.sampleSchedule);
    mergeSchedule(seasConc.sampleSchedule);
    // User drag-drop overrides win
    for (const [code, sem] of Object.entries(customPlacements)) {
      if (SEMESTER_KEYS.includes(sem)) preferredSem[code] = sem;
    }
    plan.meta.preferredSem = preferredSem;

    const makeItem = (c) => ({ ...c, data: courseEntry(c.code) });
    const toPlace = plan.meta.coreCodes
      .filter(c => plan.placement[c.code] !== 'credit')
      .map(makeItem);

    // Phase 1: Honor sample schedule entries — but SHIFT FORWARD if AP credits
    // have freed up earlier semesters and prereqs are met.
    // Only shifts when shiftForward is enabled (default true).
    const shiftForward = plan.meta.shiftForward !== false;
    const remaining = [];
    for (const item of toPlace) {
      const pref = preferredSem[item.code];
      if (!pref) { remaining.push(item); continue; }
      const prefIdx = SEMESTER_KEYS.indexOf(pref);

      // Determine the target semester: try shifting earlier if possible
      let targetSem = pref;
      if (shiftForward) {
        const earliestIdx = earliestAllowedIdx(item.data, plan.placement);
        if (earliestIdx !== null && earliestIdx < prefIdx) {
          // Scan earlier semesters for a valid, non-overloaded slot
          for (let i = earliestIdx; i < prefIdx; i++) {
            const candidate = SEMESTER_KEYS[i];
            if (!canPlaceInSemester(item.data, candidate)) continue;
            if ((plan.loads[candidate] || 0) + item.data.cu > TARGET_MAX) continue;
            targetSem = candidate;
            break;
          }
        }
      }

      if (!canPlaceInSemester(item.data, targetSem)) { remaining.push(item); continue; }
      if ((plan.loads[targetSem] || 0) + item.data.cu > TARGET_HARD_CAP) {
        remaining.push(item);
        continue;
      }
      addCoreCourseToSemester(plan, targetSem, item);
    }

    // Phase 2: Prereq-based iterative placement for remaining
    let guard = 50;
    while (remaining.length > 0 && guard-- > 0) {
      let progressed = false;
      for (let i = 0; i < remaining.length; i++) {
        const item = remaining[i];
        const earliestIdx = earliestAllowedIdx(item.data, plan.placement);
        if (earliestIdx === null) continue;
        const slot = findBestSemester(item.data, plan, earliestIdx, TARGET_MAX);
        if (!slot) continue;
        addCoreCourseToSemester(plan, slot, item);
        remaining.splice(i, 1); i--;
        progressed = true;
      }
      if (!progressed) break;
    }

    // Phase 3: Force-place stragglers in lightest available slot
    for (const item of remaining) {
      const slot = findLightestFitting(item.data, plan, 0, TARGET_HARD_CAP);
      if (slot) {
        addCoreCourseToSemester(plan, slot, item, { warning: 'Force-placed — may need manual rearrangement.' });
      } else {
        plan.notes.push({
          level: 'warning', src: 'Scheduler',
          text: `Could not place required course ${item.code}. Consult advisor.`,
        });
      }
    }

    return plan;
  }

  /**
   * Add a core course to a semester with the right category, tags, and double-count detection.
   */
  function addCoreCourseToSemester(plan, semKey, item, extras = {}) {
    const { code, sas, seas, data } = item;
    const isDouble = plan.meta.doubleCounted.has(code);
    const category = isDouble ? 'both' : (sas ? 'sas' : 'seas');
    const tags = [];
    if (isDouble) tags.push('DC');
    else if (sas) tags.push('SAS');
    else tags.push('SEAS');
    if (data.energy) tags.push('ENERGY');
    if (data.fa) tags.push(`FA:${data.fa}`);
    if (data.sec) tags.push(`SEC:${data.sec}`);
    if (extras.warning) tags.push('TIGHT');

    addCourse(plan, semKey, {
      ...data, category, tags,
      isDouble, isEnergy: data.energy,
      ...(extras.warning ? { warning: extras.warning } : {}),
    });
  }

  /**
   * Helper: is semester A at-or-before semester B in the ordering?
   */
  function semBeforeOrEqual(a, b) {
    return SEMESTER_KEYS.indexOf(a) <= SEMESTER_KEYS.indexOf(b);
  }

  /**
   * STAGE 6: Determine which FAs and Sectors are fulfilled by placed courses,
   * using both the per-major metadata AND the global course registry.
   */
  function computeFulfillment(plan, { sasMajor }) {
    const fulfilledFA = new Set();
    const fulfilledSec = new Set();

    // Auto-complete major's home sector
    if (sasMajor.autoSector) fulfilledSec.add(sasMajor.autoSector);
    // VIPR 1200/1210 grant Sector VII
    fulfilledSec.add('VII');

    // Walk placed courses (including credited) and use their FA/Sector attributes
    for (const [code, where] of Object.entries(plan.placement)) {
      const c = COURSES[code];
      if (!c) continue;
      if (c.fa) fulfilledFA.add(c.fa);
      if (c.sec) fulfilledSec.add(c.sec);
    }

    // Walk placed gen-ed SLOTS — their `intent` declares what they fulfill,
    // so the tracker shows green even when the slot holds a generic placeholder.
    // Users pick specific courses for each slot via the swap modal; the intent
    // is the contract even before a specific course is chosen.
    for (const sem of Object.values(plan.semesters)) {
      for (const entry of sem) {
        if (entry.intent?.fa) fulfilledFA.add(entry.intent.fa);
        if (entry.intent?.sec) fulfilledSec.add(entry.intent.sec);
      }
    }

    // Language: fulfilled by AP/fluency or by 4 semesters of language courses
    if (plan.meta.creditFlags?.has('LANG_FL')) fulfilledFA.add('FL');

    plan.meta.fulfilledFA = fulfilledFA;
    plan.meta.fulfilledSec = fulfilledSec;
    return plan;
  }

  /**
   * STAGE 7: Place gen-ed slots.
   *
   * In NCC mode, uses NCC_GENED_SLOTS (Foundation + Distribution buckets).
   * In legacy mode, uses the old GENED_SLOTS (Sector + FA system).
   */
  function placeGenEd(plan) {
    const overrides = plan.meta.overrides || {};
    const { curriculumMode = 'legacy', viperModsEnabled = true } = plan.meta;

    // Choose slot set based on curriculum mode
    let slots = curriculumMode === 'ncc'
      ? (window.NCC?.NCC_GENED_SLOTS || GENED_SLOTS)
      : GENED_SLOTS;

    // In NCC mode with VIPER mods enabled: remove the Key and FYS slots —
    // they're satisfied by VIPR 1200/1210 which are already placed.
    if (curriculumMode === 'ncc' && viperModsEnabled) {
      slots = slots.filter(s => s.id !== 'ncc-key' && s.id !== 'ncc-fys');
    }
    // In NCC mode WITHOUT mods: add Key and FYS as open slots (student must fulfill them separately)
    if (curriculumMode === 'ncc' && !viperModsEnabled) {
      const keySlot = {
        id: 'ncc-key', label: 'Key — Quantitative Reasoning Course',
        cu: 1, semPref: 'fall-y2',
        intent: { foundation: 'ncc-key', distribution: 'N' },
        fulfillsDesc: 'NCC Foundation: Key (w/ 3-hr lab). Without VIPER mod: student must fulfill independently.',
        note: 'Without VIPER modification, Key must be taken as a separate course (not satisfied by VIPR 1210).',
        suggests: ['MATH 1400', 'STAT 1000'],
      };
      const fysSlot = {
        id: 'ncc-fys', label: 'First-Year Seminar',
        cu: 0.5, semPref: 'spring-y1',
        intent: { foundation: 'ncc-fys', distribution: 'SS' },
        fulfillsDesc: 'NCC Foundation: First-Year Seminar. Without VIPER mod: must be taken separately from VIPR.',
        note: 'Without VIPER modification, FYS must be a separate 0.5 CU course — not satisfied by VIPR 1200.',
        suggests: [],
      };
      slots = [fysSlot, keySlot, ...slots];
    }

    for (const slot of slots) {
      const overrideCode = overrides[slot.id];
      if (overrideCode) {
        placeGenEdFromOverride(plan, slot, overrideCode);
      } else {
        placeGenEdPlaceholder(plan, slot);
      }
    }
    return plan;
  }

  function placeGenEdFromOverride(plan, slot, code) {
    // Avoid duplicate placement if the course is already somewhere in the plan
    if (plan.placement[code] && plan.placement[code] !== 'credit') return;

    const data = COURSES[code]
      ? courseEntry(code)
      : { code, title: code, cu: 1, off: BOTH, prereqs: [] };

    // Try preferred semester first
    let sem = canPlaceInSemester(data, slot.semPref) && (plan.loads[slot.semPref] || 0) + data.cu <= TARGET_HARD_CAP
      ? slot.semPref
      : null;
    // Otherwise find a light semester that accepts the offering
    if (!sem) {
      for (const k of SEMESTER_KEYS) {
        if (canPlaceInSemester(data, k) && (plan.loads[k] || 0) + data.cu <= TARGET_HARD_CAP) { sem = k; break; }
      }
    }
    if (!sem) return;

    const tags = ['Gen-Ed'];
    if (data.fa) tags.push(`FA:${data.fa}`);
    if (data.sec) tags.push(`SEC:${data.sec}`);
    tags.push('SEAS SS/H');

    addCourse(plan, sem, {
      ...data,
      category: 'gened',
      tags,
      isDouble: (data.fa && data.sec) || data.isWritSem,
      isGenEd: true,
      isElective: true,   // makes it clickable/swappable
      slotId: slot.id,
      slotLabel: slot.label,
      intent: slot.intent || {},   // slot's intent carries forward (user may pick any course)
      note: slot.note || null,
    });
  }

  function placeGenEdPlaceholder(plan, slot) {
    // Use a unique code so the scheduler doesn't treat multiple placeholders as one
    const placeholderCode = `— ${slot.id}`;
    const customSem = plan.meta.customPlacements?.[slot.id];

    // Custom placement (drag-drop) takes precedence
    let sem = null;
    if (customSem && SEMESTER_KEYS.includes(customSem)) {
      sem = customSem;
    } else if ((plan.loads[slot.semPref] || 0) + slot.cu <= TARGET_HARD_CAP) {
      sem = slot.semPref;
    } else {
      let best = null, bestLoad = Infinity;
      for (const k of SEMESTER_KEYS) {
        if ((plan.loads[k] || 0) < bestLoad && (plan.loads[k] || 0) + slot.cu <= TARGET_HARD_CAP) {
          best = k; bestLoad = plan.loads[k] || 0;
        }
      }
      sem = best;
    }
    if (!sem) return;

    addCourse(plan, sem, {
      code: '—',                      // Visible placeholder code
      placeholderCode,                // Unique key for placement map
      title: slot.label,
      cu: slot.cu,
      category: 'gened',
      tags: ['Gen-Ed'],
      isGenEd: true,
      isElective: true,
      isPlaceholder: true,
      slotId: slot.id,
      slotLabel: slot.label,
      intent: slot.intent || {},      // What this slot fulfills (for tracker)
      fulfillsDesc: slot.fulfillsDesc,
      suggests: slot.suggests || [],
      note: slot.note || slot.fulfillsDesc,
    });
    // Mark placement with unique key so duplicates don't collapse
    plan.placement[placeholderCode] = sem;
  }

  /**
   * STAGE 8: If Sector VI isn't auto-completed (MATH/CIS/ESE combos without PHYS/CHEM),
   * note it — it should already be covered by PHYS 0150 or CHEM 1012 if either is
   * required by one of the majors.
   */
  function backfillSectorVI(plan, { sasMajor, seasMajor }) {
    if (plan.meta.fulfilledSec.has('VI')) return plan;
    // See if PHYS 0150 or CHEM 1012 is already placed
    for (const fallback of SECTOR_VI_FALLBACK) {
      if (plan.placement[fallback]) {
        plan.meta.fulfilledSec.add('VI');
        return plan;
      }
    }
    return plan;
  }

  /**
   * STAGE 9: Place major electives with optional user overrides.
   * Each elective slot can be pre-filled via `overrides[slotId] = courseCode`.
   */
  function placeElectives(plan, { sasConc, seasConc, overrides = {} }) {
    const slots = [
      ...(sasConc.electiveSlots || []).map(s => ({ ...s, from: 'SAS' })),
      ...(seasConc.electiveSlots || []).map(s => ({ ...s, from: 'SEAS' })),
    ];
    // Note: Gen-ed pool (WRIT/SAST/SOCI/STSC/PSYC/CIMS/LGST/EAS 5470) covers
    // all SEAS SS/H + TBS slots; no separate placeholder needed.

    // Sort: energy-slots first (to satisfy VIPER energy req early), then generic
    const ordered = [...slots].sort((a, b) => (b.energy ? 1 : 0) - (a.energy ? 1 : 0));

    for (const slot of ordered) {
      placeOneElective(plan, slot, overrides);
    }
    return plan;
  }

  function seasGenEdSlots() { return []; } // deprecated; kept for API compatibility

  /**
   * Place a single elective slot, respecting user overrides.
   */
  function placeOneElective(plan, slot, overrides) {
    const userChoice = overrides[slot.id];
    let code = null, title = slot.label, cu = slot.cu || 1;
    let energy = !!slot.energy;

    if (userChoice) {
      code = userChoice;
      const c = COURSES[userChoice];
      if (c) {
        title = c.title; cu = c.cu; energy = energy || !!c.energy;
      }
    } else if (slot.pool && slot.pool.length) {
      // Auto-pick first from pool
      code = slot.pool[0];
      const c = COURSES[slot.pool[0]];
      if (c) {
        title = c.title; cu = c.cu; energy = energy || !!c.energy;
      }
    } else {
      // Extract code from label if formatted like "MSE 4550"
      const m = (slot.suggested || slot.label || '').match(/\b([A-Z]{2,5})\s+(\d{3,4}[A-Z]?)\b/);
      if (m) code = `${m[1]} ${m[2]}`;
    }

    // Build course object
    const data = code && COURSES[code]
      ? courseEntry(code)
      : { code: code || '—', title, cu, off: BOTH, prereqs: [] };

    // Avoid duplicate placement
    if (code && plan.placement[code] && plan.placement[code] !== 'credit') return plan;

    // Drag-drop override: if user moved this slot (by slot id) or course (by code), honor it
    const customPlacements = plan.meta.customPlacements || {};
    const customSem = customPlacements[slot.id] || (code ? customPlacements[code] : null);
    if (customSem && SEMESTER_KEYS.includes(customSem)) {
      addCourse(plan, customSem, {
        ...data,
        category: slot.from === 'SAS' ? 'sas' : 'seas',
        tags: [
          slot.from,
          ...(energy ? ['ENERGY'] : []),
          ...(data.fa ? [`FA:${data.fa}`] : []),
          ...(data.sec ? [`SEC:${data.sec}`] : []),
          'CUSTOM',
        ],
        isElective: true,
        isEnergy: energy,
        slotId: slot.id,
        slotLabel: slot.label,
        pool: slot.pool || [],
        note: slot.note || data.note || null,
      });
      return plan;
    }

    // Find slot — prefer lightest junior/senior semester
    const earliestIdx = earliestAllowedIdx(data, plan.placement) ?? 2;
    const tryOrder = [...SEMESTER_KEYS]
      .map((k, i) => ({ k, i }))
      .filter(x => x.i >= (earliestIdx || 0))
      .sort((a, b) => {
        // Prefer junior+senior (i >= 4) first; tiebreak by load
        const aSr = a.i >= 4 ? 0 : 1;
        const bSr = b.i >= 4 ? 0 : 1;
        if (aSr !== bSr) return aSr - bSr;
        return (plan.loads[a.k] || 0) - (plan.loads[b.k] || 0);
      });

    let placedSem = null;
    for (const { k } of tryOrder) {
      if (!canPlaceInSemester(data, k)) continue;
      if ((plan.loads[k] || 0) + data.cu <= TARGET_MAX) {
        placedSem = k; break;
      }
    }
    if (!placedSem) {
      // Force into lightest slot with offering constraint
      for (const { k } of tryOrder) {
        if (canPlaceInSemester(data, k)) { placedSem = k; break; }
      }
    }
    if (!placedSem) return plan;

    addCourse(plan, placedSem, {
      ...data,
      category: slot.from === 'SAS' ? 'sas' : 'seas',
      tags: [
        slot.from,
        ...(energy ? ['ENERGY'] : []),
        ...(data.fa ? [`FA:${data.fa}`] : []),
        ...(data.sec ? [`SEC:${data.sec}`] : []),
      ],
      isElective: true,
      isEnergy: energy,
      slotId: slot.id,
      slotLabel: slot.label,
      pool: slot.pool || [],
      note: slot.note || data.note || null,
    });
    return plan;
  }

  /**
   * STAGE 10: Ensure we have ≥ 3 energy courses. If short, add fallback picks.
   * Two-pass: first try light semesters under TARGET_HARD_CAP, then relax to
   * allow up to 8.5 CU if we still can't hit 3. Better to have a slightly heavy
   * semester than to miss the VIPER energy requirement.
   */
  function ensureEnergyMinimum(plan) {
    let count = 0;
    for (const sem of Object.values(plan.semesters)) {
      for (const c of sem) if (c.isEnergy) count++;
    }
    if (count >= VIPER_PROGRAM.minEnergyCourses) {
      plan.meta.energyCount = count;
      return plan;
    }

    const fillerCandidates = ['EAS 4010', 'CBE 3250', 'MSE 5450', 'MEAM 5020', 'EAS 3010', 'EAS 4020', 'CBE 5450'];
    const tryFill = (maxLoad) => {
      for (const code of fillerCandidates) {
        if (count >= VIPER_PROGRAM.minEnergyCourses) break;
        if (plan.placement[code]) continue;
        const data = courseEntry(code);
        const slot = findLightestFitting(data, plan, 2, maxLoad);
        if (!slot) continue;
        addCourse(plan, slot, {
          ...data,
          category: 'seas',
          tags: ['SEAS', 'ENERGY', 'VIPER-req'],
          isElective: true, isEnergy: true,
          note: "Added to satisfy VIPER's 3-energy-course requirement.",
        });
        count++;
      }
    };
    tryFill(TARGET_HARD_CAP);          // first pass: strict 7.5 CU cap
    if (count < VIPER_PROGRAM.minEnergyCourses) tryFill(8.5);  // relaxed cap if needed
    plan.meta.energyCount = count;
    return plan;
  }

  /**
   * STAGE 10b: Ensure total CU reaches the dual-degree minimum (46 CU).
   * If short, adds generic "Free Elective" placeholder slots in lightest semesters.
   */
  /**
   * STAGE 10b: Ensure total CU reaches the dual-degree minimum (46 CU).
   * If short, adds generic "Free Elective" placeholder slots in lightest semesters.
   *
   * Also TRIMS surplus when the plan is already well above the 46 CU minimum and
   * has unused elective slots (Free Electives or unused concentration slots) that
   * can be safely removed. This keeps NCC plans from inflating past 55 CU.
   */
  function fillToMinimumCU(plan) {
    let total = 0;
    for (const sem of Object.values(plan.semesters)) {
      for (const c of sem) total += c.cu;
    }
    const target = VIPER_PROGRAM.minTotalCU;
    let fillCount = 0;
    while (total < target && fillCount < 6) {
      // Find lightest semester in junior/senior years
      let best = null, bestLoad = Infinity;
      for (let i = 2; i < SEMESTER_KEYS.length; i++) {
        const k = SEMESTER_KEYS[i];
        if ((plan.loads[k] || 0) < bestLoad && (plan.loads[k] || 0) + 1 <= TARGET_HARD_CAP) {
          best = k; bestLoad = plan.loads[k] || 0;
        }
      }
      if (!best) break;
      addCourse(plan, best, {
        code: `FREE ${fillCount + 1}`,
        title: 'Free Elective',
        cu: 1,
        category: 'seas',
        tags: ['FREE'],
        isElective: true,
        slotId: `free-${fillCount + 1}`,
        slotLabel: 'Free Elective',
        note: 'Added to meet 46 CU dual-degree minimum. Swap for any course of interest.',
      });
      total += 1;
      fillCount++;
    }

    // TRIM PASS: if we've overshot (>= 48 CU) AND have excess electives that
    // aren't helping any specific requirement, remove them to reduce overload.
    // Protect: required cores, VIPER courses, double-counts, energy courses
    // (if already at exactly 3), gen-ed Foundation slots, placed overrides.
    const ENERGY_KEEP = VIPER_PROGRAM.minEnergyCourses;
    const SOFT_CAP = 50; // trim down toward 48-50 CU range
    const isTrimCandidate = (c) => {
      if (c.category === 'viper') return false;
      if (c.isDouble) return false;
      if (c.tags?.includes('FREE')) return true;
      // Unused concentration slots (pool-backed but user didn't explicitly choose)
      if (c.isElective && c.slotId && !plan.meta.overrides?.[c.slotId]) {
        // Don't trim if this is the energy minimum keeper
        if (c.isEnergy) {
          const currentEnergyCount = Object.values(plan.semesters).flat().filter(x => x.isEnergy).length;
          if (currentEnergyCount <= ENERGY_KEEP) return false;
        }
        return true;
      }
      return false;
    };

    // Only trim if we're meaningfully over minimum
    while (total > SOFT_CAP) {
      // Find the heaviest semester that has a trim candidate
      let victim = null, victimSem = null, heaviestLoad = 0;
      for (const [k, sem] of Object.entries(plan.semesters)) {
        if ((plan.loads[k] || 0) <= heaviestLoad) continue;
        const candidate = sem.find(isTrimCandidate);
        if (candidate) {
          victim = candidate; victimSem = k; heaviestLoad = plan.loads[k];
        }
      }
      if (!victim) break;
      // Remove it
      plan.semesters[victimSem] = plan.semesters[victimSem].filter(c => c !== victim);
      plan.loads[victimSem] = roundCU(plan.loads[victimSem] - victim.cu);
      if (victim.code && victim.code !== '—') delete plan.placement[victim.code];
      total -= victim.cu;
    }

    return plan;
  }

  /**
   * STAGE 11: Compute summary statistics.
   */
  function computeSummary(plan, { sasMajor, seasMajor }) {
    let totalCU = 0, sasCU = 0, seasCU = 0;
    for (const sem of Object.values(plan.semesters)) {
      for (const c of sem) {
        totalCU += c.cu;
        // SAS counting: SAS core, double-counts, and gen-ed (Sectors/FAs)
        if (c.category === 'sas' || c.category === 'both' || c.category === 'gened') sasCU += c.cu;
        // SEAS counting: SEAS core, double-counts, VIPER, AND gen-ed (counts as SEAS H&SS)
        if (c.category === 'seas' || c.category === 'both' || c.category === 'viper' || c.category === 'gened') seasCU += c.cu;
      }
    }
    // AP credits count toward the graduation totals (Penn policy: 1 AP = 1 CU that counts)
    let apCreditCU = 0;
    for (const [code, where] of Object.entries(plan.placement)) {
      if (where !== 'credit') continue;
      const c = COURSES[code];
      if (!c) continue;
      apCreditCU += c.cu;
      // If course appears in both majors' cores, count for both
      const inSAS = (sasMajor.sharedCore || []).includes(code)
                 || (plan.meta.sasConc?.extraCore || []).includes(code);
      const inSEAS = (seasMajor.sharedCore || []).includes(code)
                  || (plan.meta.seasConc?.extraCore || []).includes(code);
      if (inSAS) sasCU += c.cu;
      if (inSEAS) seasCU += c.cu;
    }
    totalCU += apCreditCU;

    const sasMinRequired = Math.max((sasMajor.minCU || 36) - 2, 30); // dual-degree reduction
    const seasMinRequired = 37;
    const unfulfilledFA = FA_REQUIREMENTS
      .filter(fa => !plan.meta.fulfilledFA.has(fa.id) && fa.cu > 0)
      .map(fa => fa.id);
    const unfulfilledSec = SECTORS
      .filter(s => !plan.meta.fulfilledSec.has(s.id))
      .map(s => s.id);

    plan.summary = {
      totalCU: roundCU(totalCU),
      sasCU: roundCU(sasCU),
      seasCU: roundCU(seasCU),
      sasMinRequired, seasMinRequired,
      meetsDualMin: totalCU >= VIPER_PROGRAM.minTotalCU,
      meetsSASMin:  sasCU  >= sasMinRequired,
      meetsSEASMin: seasCU >= seasMinRequired,
      energyCoursesCount: plan.meta.energyCount || 0,
      meetsEnergyReq: (plan.meta.energyCount || 0) >= VIPER_PROGRAM.minEnergyCourses,
      fulfilledFA:   Array.from(plan.meta.fulfilledFA),
      fulfilledSec:  Array.from(plan.meta.fulfilledSec),
      unfulfilledFA, unfulfilledSec,
      doubleCountedCodes: Array.from(plan.meta.doubleCounted),
      // Semester load data for ceiling indicator
      semesterLoads: { ...plan.loads },
      heavySemesters: Object.entries(plan.loads).filter(([, cu]) => cu > 6.5).map(([k]) => k),
      // NCC-specific (populated only in NCC mode)
      ncc: plan.meta.curriculumMode === 'ncc' ? (() => {
        const NCC = window.NCC;
        if (!NCC) return null;
        const dist = NCC.computeNCCDistribution(plan, plan.meta.distributionTargets);
        const checks = NCC.runNCCChecks(plan, plan.meta.distributionTargets);
        const foundations = NCC.NCC_FOUNDATIONS.map(f => {
          const viperSatisfied = f.satisfiedBy && plan.placement[f.satisfiedBy];
          const slotEntry = Object.values(plan.semesters).flat().find(c => c.slotId === f.id);
          return {
            ...f,
            satisfied: viperSatisfied || !!slotEntry,
            viperSatisfied: !!viperSatisfied,
            sem: viperSatisfied
              ? plan.placement[f.satisfiedBy]
              : (slotEntry ? Object.entries(plan.semesters).find(([, cs]) => cs.includes(slotEntry))?.[0] : null),
          };
        });
        return { dist, checks, foundations };
      })() : null,
    };
    return plan;
  }

  /**
   * STAGE 12: Sort each semester's courses for consistent display.
   */
  function sortSemesters(plan) {
    const order = { viper: 0, both: 1, sas: 2, seas: 3, gened: 4 };
    for (const key of SEMESTER_KEYS) {
      plan.semesters[key].sort((a, b) => {
        const oa = order[a.category] ?? 5;
        const ob = order[b.category] ?? 5;
        if (oa !== ob) return oa - ob;
        return a.code.localeCompare(b.code);
      });
    }
    return plan;
  }

  // ========= Orchestrator =========

  /**
   * Build a complete plan.
   *
   * @param {Object} opts
   * @param {string} opts.sasMajorKey  — e.g., 'PHYS'
   * @param {string} opts.sasConcKey   — e.g., 'PTET' (optional)
   * @param {string} opts.seasMajorKey — e.g., 'MSE'
   * @param {string} opts.seasConcKey  — e.g., 'ENERGY' (optional)
   * @param {string[]} opts.apCreditIds
   * @param {Object} opts.electiveOverrides — { slotId: courseCode }
   * @returns {Plan|null}
   */
  function buildPlan(opts) {
    const {
      sasMajorKey, seasMajorKey, apCreditIds = [],
      electiveOverrides = {}, customPlacements = {},
      curriculumMode = 'legacy',   // 'legacy' | 'ncc'
      viperModsEnabled = true,     // NCC mode: apply VIPER proposed modifications?
      shiftForward = true,          // Shift courses earlier when AP credits free up space
      distributionTargets = { N: 12, SS: 5, H: 3 }, // NCC: 12+5+3 assignment
    } = opts;
    const sasMajor = MAJORS[sasMajorKey];
    const seasMajor = MAJORS[seasMajorKey];
    if (!sasMajor || sasMajor.school !== 'SAS') return null;
    if (!seasMajor || seasMajor.school !== 'SEAS') return null;

    // Resolve concentrations
    const sasConc = resolveConcentration(sasMajor, opts.sasConcKey);
    const seasConc = resolveConcentration(seasMajor, opts.seasConcKey);

    let plan = emptyPlan({
      sasMajor, seasMajor, sasConc, seasConc,
      sasMajorKey, seasMajorKey,
      sasConcKey: sasConc._key, seasConcKey: seasConc._key,
      overrides: electiveOverrides,
      customPlacements,
      curriculumMode,
      viperModsEnabled,
      shiftForward,
      distributionTargets,
    });

    plan = applyCredits(plan, apCreditIds, { sasMajorKey, seasMajorKey });
    plan = placeVIPER(plan);
    plan = injectThermoIfNeeded(plan, { sasMajorKey, seasMajorKey });
    plan = collectCoreCourses(plan, { sasMajor, seasMajor, sasConc, seasConc });
    plan = placeCoreCourses(plan);
    plan = computeFulfillment(plan, { sasMajor });
    plan = placeGenEd(plan);
    plan = backfillSectorVI(plan, { sasMajor, seasMajor });
    plan = placeElectives(plan, { sasConc, seasConc, overrides: electiveOverrides });
    plan = computeFulfillment(plan, { sasMajor }); // recompute after gen-ed + electives
    plan = ensureEnergyMinimum(plan);
    plan = fillToMinimumCU(plan);
    plan = computeSummary(plan, { sasMajor, seasMajor });
    plan = sortSemesters(plan);

    // Attach notes from major definitions
    for (const n of (sasMajor.notes || [])) {
      plan.notes.push({ level: 'info', src: sasMajorKey, text: n });
    }
    for (const n of (seasMajor.notes || [])) {
      plan.notes.push({ level: 'info', src: seasMajorKey, text: n });
    }

    return plan;
  }

  /**
   * Resolve a concentration object given a major. Picks default if none specified.
   */
  function resolveConcentration(major, key) {
    const concs = major.concentrations || {};
    const keys = Object.keys(concs);
    if (keys.length === 0) {
      return { _key: null, label: 'Standard', extraCore: [], electiveSlots: [] };
    }
    if (key && concs[key]) return { ...concs[key], _key: key };
    // Find default
    const defaultKey = keys.find(k => concs[k].default) || keys[0];
    return { ...concs[defaultKey], _key: defaultKey };
  }

  /**
   * Return list of electives that the user could swap in for a given slot.
   * Used by the Elective Picker modal.
   */
  function electivesForSlot(slot, plan) {
    const placed = new Set(Object.keys(plan.placement).filter(c => plan.placement[c] !== 'credit'));
    const candidates = [];
    const seen = new Set();

    const add = (code, reason) => {
      if (seen.has(code) || !COURSES[code]) return;
      seen.add(code);
      candidates.push({ code, reason, ...COURSES[code] });
    };

    // 1. Slot-specific suggestions come first
    for (const c of (slot.suggests || [])) add(c, 'Suggested');
    for (const c of (slot.pool || [])) add(c, 'Suggested');

    // 2. Gen-ed slots: walk COURSES for anything with FA/Sector tags,
    //    sorted by "fulfills most requirements"
    const isGenEdSlot = slot.id?.startsWith('gened') || /Sector|SS\/H|Writing|FA/.test(slot.label || '');
    if (isGenEdSlot) {
      const genEdPicks = Object.entries(COURSES)
        .filter(([code, c]) => (c.fa || c.sec) && !seen.has(code))
        .map(([code, c]) => {
          let reason = '';
          const parts = [];
          if (c.fa) parts.push(`FA ${c.fa}`);
          if (c.sec) parts.push(`Sector ${c.sec}`);
          reason = parts.join(' + ');
          return { code, reason, count: parts.length, ...c };
        })
        .sort((a, b) => b.count - a.count);
      for (const p of genEdPicks) {
        if (!seen.has(p.code)) { seen.add(p.code); candidates.push(p); }
      }
    }

    // 3. If slot is energy-tagged, include all VIPER energy courses
    if (slot.energy) {
      for (const c of D.ENERGY_COURSES) add(c, 'Energy');
    }

    // 4. Include courses with matching subject prefix (e.g., "MSE Elective" → all MSE)
    const prefix = (slot.label || '').match(/^([A-Z]{2,5})\b/)?.[1];
    if (prefix && !isGenEdSlot) {
      for (const [c, info] of Object.entries(COURSES)) {
        if (c.startsWith(prefix + ' ') && !seen.has(c)) {
          seen.add(c);
          candidates.push({ code: c, reason: `${prefix} course`, ...info });
        }
      }
    }

    // Filter out already-placed courses
    return candidates.filter(c => !placed.has(c.code));
  }

  // Expose scheduler API
  window.SCHEDULER = {
    buildPlan,
    resolveConcentration,
    electivesForSlot,
    // expose helpers for tests
    emptyPlan, applyCredits, placeVIPER, placeCoreCourses,
    computeFulfillment, placeGenEd, placeElectives,
    TARGET_MIN, TARGET_IDEAL, TARGET_MAX, TARGET_HARD_CAP,
  };
})();

/* ============================================================================
   SECTION 5: NEW COLLEGE CURRICULUM (NCC) MODULE

   Implements the framework replacing Sectors + Foundational Approaches:
   • Foundations — Kite, Key, FYS, Perspectives & Difference, Language, Writing
   • Distribution — 12 CUs in one division, 5 in another, 3 in the third.
     Divisions: Humanities & Arts (H), Social Sciences (SS), Natural Sciences (N)
     For VIPER, N=12 by default; user can reassign.

   VIPER modifications (toggleable):
     1. FYS + Key satisfied by VIPR 1200 + VIPR 1210
     2. Kite 3-hr lab waived/summer/async
     3. Language waived if curriculum can't fit in 4 years
     4. Kite + Writing + all VIPR 1300 CUs count toward SS/H distribution
     5. Kite satisfies SEAS Humanities attribute
     6. Up to 3 A&S CUs waived upon audit
   ============================================================================ */

(function() {
  const D = window.DATA;

  // ---- Division classification from course code prefix ----
  const NATURAL_PREFIXES = ['MATH','PHYS','CHEM','BIOL','MSE','CBE','MEAM','ESE','CIS',
                            'EESC','ENGR','EAS','ENM','STAT','ENVS','VIPR','BIOE','ASTR'];
  const SOCSCI_PREFIXES  = ['SOCI','ECON','PSYC','STSC','LGST','PSCI','ANTH','URBS','COMM'];
  const HUMANITIES_PREFIXES = ['ENGL','HIST','ARTH','MUSC','CLST','RELS','CIMS','PHIL',
                                'WRIT','SAST','AFRC','ASAM','LING','THAR','NELC','GSWS',
                                'GRMN','FREN','SPAN','ITAL','RUSS','ARAB','CHIN','JPAN',
                                'LATN','GREK','HEBR','KREN','PORT','YDSH'];

  function divisionForCode(code) {
    if (!code) return null;
    const prefix = code.split(' ')[0];
    if (NATURAL_PREFIXES.includes(prefix)) return 'N';
    if (SOCSCI_PREFIXES.includes(prefix))  return 'SS';
    if (HUMANITIES_PREFIXES.includes(prefix)) return 'H';
    return null;
  }

  // ---- NCC Foundations ----
  // Each Foundation can optionally be satisfied by a VIPER course when modifications
  // are enabled (satisfiedByViper: { code, appliesWhenModsEnabled }).
  const NCC_FOUNDATIONS = [
    {
      id: 'ncc-writ',
      label: 'Critical Writing Seminar',
      cu: 1,
      note: 'Completed as usual — VIPER does not waive.',
      satisfiedByViper: null,
    },
    {
      id: 'ncc-fys',
      label: 'First-Year Seminar',
      cu: 1,
      note: 'Small discussion course.',
      satisfiedByViper: { code: 'VIPR 1200', rationale: 'VIPER modification: VIPR 1200 provides the FYS experience.' },
    },
    {
      id: 'ncc-key',
      label: 'Key (Quantitative Reasoning)',
      cu: 1,
      note: 'Includes 3-hour lab component.',
      satisfiedByViper: { code: 'VIPR 1210', rationale: 'VIPER modification: VIPR 1210 provides the Key experience.' },
    },
    {
      id: 'ncc-kite',
      label: 'Kite (Humanities)',
      cu: 1,
      note: 'Includes 3-hour lab. With VIPER mods: lab may be waived or done asynchronously/summer.',
      satisfiedByViper: null,  // Kite itself is still required; only the lab is waivable
      labWaivable: true,
    },
    {
      id: 'ncc-pad',
      label: 'Perspectives & Difference',
      cu: 1,
      note: 'Engages questions of difference and equity.',
      satisfiedByViper: null,
    },
    {
      id: 'ncc-lang',
      label: 'Language (0–2 CUs)',
      cu: 1,
      note: 'Varies by placement; up to 2 CUs. With VIPER mods: may be waived if curriculum cannot fit in 4 years.',
      satisfiedByViper: null,
      viperWaivable: true,
    },
  ];

  // ---- Generic NCC gen-ed slots (placed by the scheduler) ----
  // Each slot declares division (H/SS/N) + foundation id so the tracker credits it.
  // In NCC mode with VIPER mods:
  //   - ncc-fys and ncc-key are REMOVED (satisfied by VIPR 1200/1210)
  //   - ncc-writ counts toward H distribution
  //   - ncc-kite counts toward H distribution AND satisfies SEAS Humanities
  //   - ncc-lang removed (waived)
  // Without VIPER mods:
  //   - All 6 Foundations required as separate courses
  //   - Kite lab is a full 1 CU course (no waiver)
  const NCC_GENED_SLOTS = [
    {
      id: 'ncc-writ',
      label: 'Critical Writing Seminar',
      cu: 1,
      semPref: 'fall-y1',
      intent: { foundation: 'ncc-writ', distribution: 'H' },
      fulfillsDesc: 'Foundation: Writing · counts toward H distribution (VIPER: also toward SS/H)',
      suggests: ['WRIT 0130'],
      note: 'Any Penn WRIT 01xx seminar. Pick a topic that interests you.',
    },
    {
      id: 'ncc-kite',
      label: 'Kite — Humanities Foundation',
      cu: 1,
      semPref: 'spring-y1',
      intent: { foundation: 'ncc-kite', distribution: 'H' },
      fulfillsDesc: 'Foundation: Kite · H distribution · (VIPER: also SEAS Humanities)',
      suggests: [],
      note: 'A humanities course designated as Kite. Includes a 3-hour lab component (waivable under VIPER mods).',
    },
    {
      id: 'ncc-pad',
      label: 'Perspectives & Difference',
      cu: 1,
      semPref: 'fall-y2',
      intent: { foundation: 'ncc-pad', distribution: 'SS' },
      fulfillsDesc: 'Foundation: Perspectives & Difference · typically SS distribution',
      suggests: [],
      note: 'A course engaging questions of difference and equity.',
    },
    // Distribution-only slots (no Foundation) — placed later in the plan.
    // These fill out whichever distribution (SS/H) still needs CU to reach target.
    {
      id: 'ncc-dist-1',
      label: 'Distribution Elective',
      cu: 1,
      semPref: 'spring-y2',
      intent: { distribution: 'SS' },
      fulfillsDesc: 'Counts toward whichever distribution has remaining target.',
      note: 'Open distribution slot — pick any SS or H course to fill your smallest distribution bucket.',
    },
    {
      id: 'ncc-dist-2',
      label: 'Distribution Elective',
      cu: 1,
      semPref: 'fall-y3',
      intent: { distribution: 'SS' },
      fulfillsDesc: 'Counts toward whichever distribution has remaining target.',
      note: 'Open distribution slot.',
    },
    {
      id: 'ncc-dist-3',
      label: 'Distribution Elective',
      cu: 1,
      semPref: 'spring-y3',
      intent: { distribution: 'H' },
      fulfillsDesc: 'Counts toward whichever distribution has remaining target.',
      note: 'Open distribution slot.',
    },
    {
      id: 'ncc-dist-4',
      label: 'Distribution Elective',
      cu: 1,
      semPref: 'fall-y4',
      intent: { distribution: 'SS' },
      fulfillsDesc: 'Counts toward whichever distribution has remaining target.',
      note: 'Open distribution slot.',
    },
  ];

  // ---- Compute distribution CUs from the current plan ----
  // Counts CUs that fall in each division (N / SS / H).
  // VIPER-specific rules when mods enabled:
  //   • All VIPR 1300 CUs → count in SS/H distribution (user's choice: default SS, half-half)
  //   • Kite → H, even with lab waived
  //   • Writing → H
  function computeNCCDistribution(plan, targets, viperModsEnabled) {
    const cuByDiv = { N: 0, SS: 0, H: 0 };

    for (const sem of Object.values(plan.semesters)) {
      for (const c of sem) {
        // Use slot intent first (Foundation slots declare division)
        const intentDiv = c.intent?.distribution;
        if (intentDiv && cuByDiv[intentDiv] !== undefined) {
          cuByDiv[intentDiv] += c.cu;
          continue;
        }
        // VIPER mod: VIPR 1300 CUs → split to SS/H
        if (c.code === 'VIPR 1300' && viperModsEnabled) {
          cuByDiv.SS += c.cu;  // default all VIPR-1300 → SS
          continue;
        }
        // VIPER 1200/1210 counted as N (Natural Sciences) by default
        if ((c.code === 'VIPR 1200' || c.code === 'VIPR 1210') && !viperModsEnabled) {
          cuByDiv.N += c.cu;
          continue;
        }
        // Otherwise use prefix-based division
        const div = divisionForCode(c.code);
        if (div && cuByDiv[div] !== undefined) cuByDiv[div] += c.cu;
      }
    }

    // Pair computed CU with targets (which the user configures: 12/5/3 assignment)
    return {
      cuByDiv,
      targets,
      meetsAll: (cuByDiv.N >= targets.N) && (cuByDiv.SS >= targets.SS) && (cuByDiv.H >= targets.H),
      shortfall: {
        N:  Math.max(0, targets.N  - cuByDiv.N),
        SS: Math.max(0, targets.SS - cuByDiv.SS),
        H:  Math.max(0, targets.H  - cuByDiv.H),
      },
    };
  }

  // ---- Run constraint checks for NCC mode ----
  // Returns an array of { severity: 'error'|'warning'|'info', msg: string } entries.
  function runNCCChecks(plan, targets, viperModsEnabled) {
    const checks = [];

    // Foundation satisfaction
    for (const f of NCC_FOUNDATIONS) {
      // Skip FYS+Key foundations when VIPER mods enabled (satisfied by VIPR)
      if (viperModsEnabled && (f.id === 'ncc-fys' || f.id === 'ncc-key')) continue;
      // Skip Language when VIPER mods enabled (waivable)
      if (viperModsEnabled && f.id === 'ncc-lang') continue;

      const satisfiedByViper = f.satisfiedByViper && plan.placement[f.satisfiedByViper.code];
      const slotPlaced = Object.values(plan.semesters).flat().some(c => c.slotId === f.id);
      if (!satisfiedByViper && !slotPlaced) {
        checks.push({
          severity: 'error',
          source: 'Foundation',
          msg: `${f.label}: not fulfilled. ${viperModsEnabled ? '' : 'Without VIPER modifications, this requires a standalone course.'}`,
        });
      }
    }

    // Distribution targets
    const dist = computeNCCDistribution(plan, targets, viperModsEnabled);
    for (const key of ['N', 'SS', 'H']) {
      const short = dist.shortfall[key];
      if (short > 0) {
        checks.push({
          severity: 'warning',
          source: 'Distribution',
          msg: `${divLabel(key)}: ${dist.cuByDiv[key].toFixed(1)} / ${targets[key]} CU (need ${short.toFixed(1)} more).`,
        });
      }
    }

    // BA minimum (36 CU under NCC, minus VIPER waivers)
    const baMin = 36 - (viperModsEnabled ? 3 : 0);
    const baCU = plan.summary?.sasCU || 0;
    if (baCU < baMin) {
      checks.push({
        severity: 'warning',
        source: 'BA minimum',
        msg: `BA CU: ${baCU.toFixed(1)} / ${baMin}. ${viperModsEnabled ? 'VIPER audit waiver of up to 3 CU applied.' : 'Without waiver, full 36 CU required.'}`,
      });
    }

    // Semester ceiling
    for (const [sem, cu] of Object.entries(plan.loads || {})) {
      if (cu > 6.5) {
        const label = D.semesterLabel(sem).season;
        checks.push({
          severity: 'warning',
          source: 'Semester ceiling',
          msg: `${label}: ${cu} CU exceeds 6.5 CU comfortable ceiling.`,
        });
      }
    }

    // If no issues
    if (checks.length === 0) {
      checks.push({ severity: 'info', source: 'Status', msg: 'All NCC requirements met; no constraint violations.' });
    }
    return checks;
  }

  function divLabel(key) {
    return key === 'N' ? 'Natural Sciences' : key === 'SS' ? 'Social Sciences' : 'Humanities & Arts';
  }

  // ---- Expose data/helper API ----
  window.NCC = {
    NCC_FOUNDATIONS,
    NCC_GENED_SLOTS,
    divisionForCode,
    divLabel,
    computeNCCDistribution,
    runNCCChecks,
  };
})();

  // ---- Constraint Panel — lists NCC-specific violations/warnings ----
  const ConstraintPanel = ({ plan, viperModsEnabled, distributionTargets }) => {
    const checks = plan.summary?.ncc?.checks || NCC.runNCCChecks(plan, distributionTargets, viperModsEnabled);

      <div style={{overflowX:'auto'}}>

            <tr style={{borderBottom:'2px solid #0f3021'}}>
              <th style={{textAlign:'left',padding:'8px 10px',width:'28%'}}>Requirement</th>
              <th style={{textAlign:'left',padding:'8px 10px',width:'36%'}}>Legacy (current)</th>
              <th style={{textAlign:'left',padding:'8px 10px',width:'36%'}}>NCC (new)</th>
            </tr>
          </thead>
          <tbody>
            {[
              ['BA minimum', '32 CU (VIPER reduction of 2)', '36 CU · VIPER: up to 3 CU waivable upon audit'],
              ['Writing', '1 Critical Writing Seminar (FA: WRIT)', '1 Critical Writing Seminar (unchanged) · VIPER: also counts toward H distribution'],
              ['Foundational Approaches', 'WRIT, FL, FRA, QDA, CCA, CDUS (6 items)', 'Replaced by Foundations: Kite, Key, FYS, P&D, Language, Writing'],
              ['FYS + Key', 'Not required', 'Required · VIPER mod: satisfied by VIPR 1200 + VIPR 1210'],
              ['Kite (Humanities)', 'Not required', 'Required + 3-hr lab · VIPER mod: lab waived/summer/async'],
              ['Language', '4-semester FL requirement', '0–2 CU · VIPER mod: waivable if curriculum doesn\'t fit 4 years'],
              ['Sectors', 'Sectors I–VII (7 required)', 'Replaced by 12+5+3 Distribution across H/SS/N divisions'],
              ['Distribution', 'N/A', '12 + 5 + 3 CUs across 3 divisions · VIPER 12 = Natural Sciences'],
              ['VIPR 1300 counts', 'Counts toward SEAS SS/H', 'VIPER mod: also counts toward SS/H distribution'],
              ['SEAS Humanities', 'Satisfied by various SAS H courses', 'VIPER mod: Kite gets SEAS Humanities attribute'],
            ].map((row, i) => (
              <tr key={i} style={{borderBottom:'1px dotted rgba(21,32,26,0.12)'}}>
                <td style={{padding:'8px 10px',fontWeight:600,color:'#0f3021'}}>{row[0]}</td>
                <td style={{padding:'8px 10px',color:'rgba(21,32,26,0.8)'}}>{row[1]}</td>
                <td style={{padding:'8px 10px',color:'rgba(21,32,26,0.8)'}}>{row[2]}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );

  // ---- Reference: VIPR → NCC mapping ----
  const VIPRtoNCCPanel = () => (
    <div className="panel p-5">
      <h3 className="font-display text-lg font-bold text-forest-700 accent-line mb-3">VIPR Courses → NCC Requirements</h3>
      <div className="text-xs text-ink/70 mb-4">
        How existing VIPER coursework maps onto the NCC framework (with VIPER modifications enabled).
      </div>
      <div className="space-y-2">
        {[
          { code: 'VIPR 1200', fulfills: 'Foundation: First-Year Seminar', cu: 0.5, note: 'Freshman Spring. Replaces a standalone FYS course.' },
          { code: 'VIPR 1210', fulfills: 'Foundation: Key (Quantitative Reasoning)', cu: 0.5, note: 'Sophomore Fall. Replaces a standalone Key course w/ 3-hr lab.' },
          { code: 'VIPR 1300', fulfills: 'SS/H Distribution (counts 5 × 0.5 = 2.5 CU)', cu: 0.5, note: 'Five semesters, Sophomore Spring → Senior Spring. Counts toward whichever SS/H distribution has capacity.' },
          { code: 'Kite (any)', fulfills: 'Foundation: Kite · H Distribution · SEAS Humanities', cu: 1, note: 'Under VIPER mods, one Kite course triple-counts.' },
          { code: 'Writing Seminar', fulfills: 'Foundation: Writing · H Distribution · SEAS Writing', cu: 1, note: 'Under VIPER mods, also counts toward H distribution.' },
        ].map((row, i) => (
          <div key={i} className="flex items-start gap-3 py-2 border-b border-dotted border-ink/10 text-xs">
            <span className="course-code text-forest-700 font-medium flex-shrink-0 min-w-[85px]">{row.code}</span>
            <div className="flex-1">
              <div className="text-ink font-medium">{row.fulfills}</div>
              <div className="text-ink/55 text-[11px] italic mt-0.5">{row.note}</div>
            </div>
            <span className="cu-badge">{row.cu} CU</span>
          </div>
        ))}
      </div>
    </div>
  );

  // ---- Expose UI API ----
  window.NCC_UI = {
    NCCModeBanner,
    FoundationsChecklist,
    DistributionTracker,
    SemesterLoadPanel,
    ConstraintPanel,
    NCCvsLegacyTable,
    VIPRtoNCCPanel,
  };
})();

const D = window.DATA;
const S = window.SCHEDULER;
const UI = window.UI;
// MAJORS, SAS_MAJORS, SEAS_MAJORS, SEMESTER_KEYS, semesterLabel already in scope from 02-data.jsx

function App() {
  const [sasMajorKey,  setSasMajorKey]  = useState('CHEM');
  const [sasConcKey,   setSasConcKey]   = useState('STANDARD');
  const [seasMajorKey, setSeasMajorKey] = useState('CBE');
  const [seasConcKey,  setSeasConcKey]  = useState('ENERGY');
  const [apCreditIds,  setApCreditIds]  = useState(['ap-calc-bc']);
  const [electiveOverrides, setElectiveOverrides] = useState({});
  const [customPlacements, setCustomPlacements] = useState({});  // {code|slotId: semKey}
  const [colorOverrides, setColorOverrides] = useState({});      // {code: colorName}
  const [gradYear, setGradYear] = useState(2028);
  const [view, setView] = useState('plan');
  const [layout, setLayout] = useState('list');  // default: list (more readable)
  const [focusSemIdx, setFocusSemIdx] = useState(0);
  const [shiftForward, setShiftForward] = useState(true);  // use AP credits to shift courses earlier

  // Curriculum mode state
  const [curriculumMode, setCurriculumMode] = useState('legacy'); // 'legacy' | 'ncc'
  const [viperModsEnabled, setViperModsEnabled] = useState(true);
  const [distributionTargets, setDistributionTargets] = useState({ N: 12, SS: 5, H: 3 });

  // Editing state for elective picker
  const [editing, setEditing] = useState(null); // { course, semKey }

  // Drag state
  const [dragging, setDragging] = useState(null); // { course, fromSem }

  // Color picker state
  const [colorPicking, setColorPicking] = useState(null); // { code, semKey }

  // Export menu state
  const [exportMenuOpen, setExportMenuOpen] = useState(false);
  const fileInputRef = useRef(null);

  // When major changes, reset concentration to default
  useEffect(() => {
    const m = MAJORS[sasMajorKey];
    const keys = Object.keys(m?.concentrations || {});
    const def = keys.find(k => m.concentrations[k].default) || keys[0];
    if (def && !m.concentrations[sasConcKey]) setSasConcKey(def);
  }, [sasMajorKey]);

  useEffect(() => {
    const m = MAJORS[seasMajorKey];
    const keys = Object.keys(m?.concentrations || {});
    const def = keys.find(k => m.concentrations[k].default) || keys[0];
    if (def && !m.concentrations[seasConcKey]) setSeasConcKey(def);
  }, [seasMajorKey]);

  // Clear overrides + custom placements when major/concentration changes (slot IDs differ)
  useEffect(() => {
    setElectiveOverrides({});
    setCustomPlacements({});
  }, [sasMajorKey, sasConcKey, seasMajorKey, seasConcKey]);

  const plan = useMemo(() => S.buildPlan({
    sasMajorKey, sasConcKey, seasMajorKey, seasConcKey,
    apCreditIds, electiveOverrides, customPlacements,
    curriculumMode, viperModsEnabled, shiftForward,
    distributionTargets,
  }), [sasMajorKey, sasConcKey, seasMajorKey, seasConcKey, apCreditIds, electiveOverrides, customPlacements, curriculumMode, viperModsEnabled, shiftForward, distributionTargets]);

  // Warn if MATH+CIS without AP Chem / lab waivers
  const isMathCIS = sasMajorKey === 'MATH' && seasMajorKey === 'CIS';

  const onSelectElective = useCallback((slotId, code) => {
    setElectiveOverrides(prev => ({ ...prev, [slotId]: code }));
  }, []);

  const onResetOverrides = () => {
    setElectiveOverrides({});
    setCustomPlacements({});
    setColorOverrides({});
  };

  const handleColorChange = useCallback((code, color) => {
    setColorOverrides(prev => {
      const next = { ...prev };
      if (color === null || color === undefined) delete next[code];
      else next[code] = color;
      return next;
    });
  }, []);

  const onPrint = () => window.print();

  // ---- Drag-and-drop handlers ----
  const onDragStart = useCallback((e, course, fromSem) => {
    setDragging({ course, fromSem });
    try { e.dataTransfer.effectAllowed = 'move'; } catch {}
  }, []);

  const onDragEnd = useCallback(() => setDragging(null), []);

  const onDrop = useCallback((course, toSem) => {
    if (!course) return;
    // Determine the key we set in customPlacements:
    // - core courses use their course code
    // - gen-ed placeholders and elective slots use their slotId (for proper scheduler routing)
    const key = (course.isPlaceholder || course.isElective) && course.slotId
      ? course.slotId
      : course.code;
    if (!key) return;
    setCustomPlacements(prev => ({ ...prev, [key]: toSem }));
    setDragging(null);
  }, []);

  const dragState = {
    active: !!dragging,
    course: dragging?.course,
    fromSem: dragging?.fromSem,
    onStart: onDragStart,
    onEnd: onDragEnd,
  };

  // ---- Export / Import ----
  const exportJSON = () => {
    const state = {
      version: 5,
      exportedAt: new Date().toISOString(),
      sasMajorKey, sasConcKey, seasMajorKey, seasConcKey,
      apCreditIds, electiveOverrides, customPlacements, colorOverrides,
      gradYear, shiftForward,
      curriculumMode, viperModsEnabled, distributionTargets,
    };
    downloadBlob(
      new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }),
      `viper-plan-${sasMajorKey}-${seasMajorKey}-${gradYear}.json`
    );
    setExportMenuOpen(false);
  };

  const exportCSV = () => {
    const sasMajor = MAJORS[sasMajorKey];
    const seasMajor = MAJORS[seasMajorKey];
    const rows = [];
    // Title row
    rows.push([`VIPER Four-Year Plan: ${sasMajor.fullName} (BA) + ${seasMajor.fullName} (BSE) — Class of ${gradYear}`]);
    rows.push([]);

    // Build side-by-side Fall/Spring for each year (matching the VIPER template PDF format)
    for (let yr = 1; yr <= 4; yr++) {
      const fallKey = `fall-y${yr}`;
      const springKey = `spring-y${yr}`;
      const fallLabel = semesterLabel(fallKey, gradYear).season;
      const springLabel = semesterLabel(springKey, gradYear).season;
      const fallCourses = plan.semesters[fallKey] || [];
      const springCourses = plan.semesters[springKey] || [];

      rows.push([`Year ${yr}`]);
      rows.push([fallLabel, '', '', springLabel]);
      rows.push(['Course', 'CU', '', 'Course', 'CU']);

      const maxLen = Math.max(fallCourses.length, springCourses.length);
      for (let i = 0; i < maxLen; i++) {
        const fc = fallCourses[i];
        const sc = springCourses[i];
        rows.push([
          fc ? `${fc.code} (${fc.title})` : '', fc ? fc.cu : '',
          '',
          sc ? `${sc.code} (${sc.title})` : '', sc ? sc.cu : '',
        ]);
      }

      const fallTotal = fallCourses.reduce((s, c) => s + c.cu, 0);
      const springTotal = springCourses.reduce((s, c) => s + c.cu, 0);
      rows.push(['Total', fallTotal.toFixed(1), '', 'Total', springTotal.toFixed(1)]);
      rows.push([]);
    }

    // Summary
    rows.push(['Summary']);
    rows.push(['Total CU', plan.summary.totalCU.toFixed(1)]);
    rows.push(['Energy Courses', `${plan.summary.energyCoursesCount}/3`]);
    rows.push(['Double-Counted', plan.summary.doubleCountedCodes.length]);
    rows.push([]);
    rows.push(['Developed by Arjun Sharma VIPER \'28']);

    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    downloadBlob(
      new Blob([csv], { type: 'text/csv' }),
      `viper-plan-${sasMajorKey}-${seasMajorKey}-${gradYear}.csv`
    );
    setExportMenuOpen(false);
  };

  const copyShareLink = () => {
    const state = { sasMajorKey, sasConcKey, seasMajorKey, seasConcKey, apCreditIds, electiveOverrides, customPlacements, colorOverrides, gradYear, shiftForward, curriculumMode, viperModsEnabled, distributionTargets };
    const hash = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    const url = `${window.location.origin}${window.location.pathname}#${hash}`;
    navigator.clipboard?.writeText(url).then(
      () => { alert('Link copied! Paste it anywhere to share your exact plan.'); },
      () => { prompt('Copy this link:', url); }
    );
    setExportMenuOpen(false);
  };

  const triggerImport = () => { fileInputRef.current?.click(); setExportMenuOpen(false); };

  const onImportFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const state = JSON.parse(ev.target.result);
        if (state.sasMajorKey) setSasMajorKey(state.sasMajorKey);
        if (state.sasConcKey)  setSasConcKey(state.sasConcKey);
        if (state.seasMajorKey) setSeasMajorKey(state.seasMajorKey);
        if (state.seasConcKey) setSeasConcKey(state.seasConcKey);
        if (state.apCreditIds) setApCreditIds(state.apCreditIds);
        if (state.electiveOverrides) setElectiveOverrides(state.electiveOverrides);
        if (state.customPlacements) setCustomPlacements(state.customPlacements);
        if (state.colorOverrides) setColorOverrides(state.colorOverrides);
        if (state.gradYear) setGradYear(state.gradYear);
        if (typeof state.shiftForward === 'boolean') setShiftForward(state.shiftForward);
        if (state.curriculumMode) setCurriculumMode(state.curriculumMode);
        if (typeof state.viperModsEnabled === 'boolean') setViperModsEnabled(state.viperModsEnabled);
        if (state.distributionTargets) setDistributionTargets(state.distributionTargets);
      } catch (err) {
        alert('Could not read plan file: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';  // allow re-importing the same file
  };

  // Load from URL hash on initial mount
  useEffect(() => {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    try {
      const state = JSON.parse(decodeURIComponent(escape(atob(hash))));
      if (state.sasMajorKey) setSasMajorKey(state.sasMajorKey);
      if (state.sasConcKey)  setSasConcKey(state.sasConcKey);
      if (state.seasMajorKey) setSeasMajorKey(state.seasMajorKey);
      if (state.seasConcKey) setSeasConcKey(state.seasConcKey);
      if (state.apCreditIds) setApCreditIds(state.apCreditIds);
      if (state.electiveOverrides) setElectiveOverrides(state.electiveOverrides);
      if (state.customPlacements) setCustomPlacements(state.customPlacements);
      if (state.colorOverrides) setColorOverrides(state.colorOverrides);
      if (state.gradYear) setGradYear(state.gradYear);
      if (typeof state.shiftForward === 'boolean') setShiftForward(state.shiftForward);
      if (state.curriculumMode) setCurriculumMode(state.curriculumMode);
      if (typeof state.viperModsEnabled === 'boolean') setViperModsEnabled(state.viperModsEnabled);
      if (state.distributionTargets) setDistributionTargets(state.distributionTargets);
    } catch {}
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  if (!plan) {
    return <div className="p-8 text-center text-pennred">Invalid major combination.</div>;
  }

  const sasMajor = MAJORS[sasMajorKey];
  const seasMajor = MAJORS[seasMajorKey];
  const sasConc = sasMajor.concentrations[sasConcKey] || Object.values(sasMajor.concentrations)[0];
  const seasConc = seasMajor.concentrations[seasConcKey] || Object.values(seasMajor.concentrations)[0];

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="border-b border-ink/10 bg-white/90 backdrop-blur sticky top-0 z-20 no-print">
        <div className="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between gap-6">
          <UI.Logo />
          <div className="flex items-center gap-3">
            <div className="hidden md:flex items-center gap-2 text-xs text-ink/70">
              <Pill_ className="bg-forest-50 text-forest-700">{sasMajor.code}</Pill_>
              <span className="text-ink/30">×</span>
              <Pill_ className="bg-forest-700 text-cream-50">{seasMajor.code}</Pill_>
              <span className="text-ink/30">·</span>
              <span className="tick">Class of {gradYear}</span>
            </div>
            <div className="tabs hidden lg:flex" style={{margin:0,border:'none'}}>
              <button className={`tab-btn ${view === 'plan' ? 'active' : ''}`} onClick={() => setView('plan')}>Plan</button>
              <button className={`tab-btn ${view === 'ncc' ? 'active' : ''}`} onClick={() => setView('ncc')}
                style={view !== 'ncc' && curriculumMode === 'ncc' ? {color:'#c8871c'} : {}}>
                {curriculumMode === 'ncc' ? '★ NCC' : 'NCC'}
              </button>
              <button className={`tab-btn ${view === 'reference' ? 'active' : ''}`} onClick={() => setView('reference')}>Reference</button>
            </div>
            <div className="relative">
              <button onClick={() => setExportMenuOpen(v => !v)}
                      className="btn-primary px-4 py-2 text-xs tick">
                <span>↓</span> Export
              </button>
              {exportMenuOpen && (
                <>
                  <div className="fixed inset-0 z-30" onClick={() => setExportMenuOpen(false)}></div>
                  <div className="absolute right-0 mt-2 w-60 panel z-40" style={{padding: 0}}>
                    <ExportMenuItem onClick={exportJSON} icon="{}" label="Download JSON" hint="Save + re-import later" />
                    <ExportMenuItem onClick={exportCSV}  icon="☰"  label="Download CSV"  hint="Open in Excel / Sheets" />

// ---- Utility: trigger a file download for a Blob ----
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
