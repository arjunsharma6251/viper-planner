                outline: userColor ? '1px solid rgba(21,32,26,0.35)' : 'none',
                outlineOffset: userColor ? '1px' : 0,
                transition: 'transform 120ms ease',
              }}
              title={userColor ? `Custom color (was ${c.category}). Click to change.` : `${c.category} — click to color-code`}></span>
              {paletteOpen && colorChangeable && (
                <span style={{position:'absolute', top:'140%', left:0, zIndex:50, background:'#fff',
                              border:'1px solid rgba(21,32,26,0.15)', padding:6, borderRadius:4,
                              display:'flex', gap:4, boxShadow:'0 4px 12px rgba(21,32,26,0.15)'}}
                      onClick={(e) => e.stopPropagation()}>
                  {PALETTE.map(p => (
                    <span key={p.name}
                          onClick={(e) => { e.stopPropagation(); onColorChange(c.code, p.hex); setPaletteOpen(false); }}
                          style={{width:16, height:16, borderRadius:'50%', background:p.hex, cursor:'pointer',
                                  border: userColor === p.hex ? '2px solid #15201a' : '1px solid rgba(21,32,26,0.2)'}}
                          title={p.name}></span>
                  ))}
                  {userColor && (
                    <span onClick={(e) => { e.stopPropagation(); onColorChange(c.code, null); setPaletteOpen(false); }}
                          title="Reset to category color"
                          style={{width:16, height:16, borderRadius:'50%', background:'transparent',
                                  border:'1px dashed rgba(21,32,26,0.4)', cursor:'pointer',
                                  display:'flex', alignItems:'center', justifyContent:'center',
                                  fontSize:10, color:'rgba(21,32,26,0.6)'}}>×</span>
                  )}
                </span>
              )}
            </span>
            {isPlaceholder
              ? <span className="course-code text-ink/40 font-medium italic">{c.code}</span>
              : (onEditCode && !isLocked
                  ? <span className={`course-code font-medium cursor-pointer hover:underline ${c.isRenamed ? 'text-gold-600' : 'text-forest-700'}`}
                          title={c.isRenamed ? `Renamed from ${c.originalCode}. Click to edit.` : 'Click to rename'}
                          onClick={(e) => { e.stopPropagation(); onEditCode(c); }}>{c.code}</span>
                  : <span className="course-code text-forest-700 font-medium">{c.code}</span>)}
            {pcrUrlFor(c) && (
              <a
                href={pcrUrlFor(c)}
                target="_blank"
                rel="noopener noreferrer"
                onClick={(e) => e.stopPropagation()}
                className="pcr-link"
                title={`View ${c.code} reviews on Penn Course Review`}>
                <span aria-hidden="true">↗</span>
                <span className="pcr-link-label">PCR</span>
              </a>
            )}
            {c.isDouble && <span className="tag tag-double">★ DC</span>}
            {c.isEnergy && <span className="tag tag-energy">⚡</span>}
            {c.tags && c.tags.includes('EXCEEDS-MAX') && (
              <span className="tag" title="This course was placed above Penn's 7.5 CU semester cap — needs school approval or a summer course."
                    style={{background:'#a51e22',color:'#fbf8f1',fontWeight:700,letterSpacing:'0.05em'}}>
                NEEDS APPROVAL
              </span>
            )}
            {c.tags && c.tags.includes('TIGHT') && !c.tags.includes('EXCEEDS-MAX') && <span className="tag tag-overload">TIGHT</span>}
            {c.tags && c.tags.includes('CUSTOM') && <span className="tag" style={{background:'#eadfc7',color:'#4a3511'}}>MOVED</span>}
            {isPlaceholder && <span className="tag" style={{background:'#f6efe0',color:'#61490f',border:'1px solid #d4b569'}}>pick</span>}
            {/* User-marked fulfillments — compact "fulfills:" indicator */}
            {userFulfills && userFulfills.length > 0 && (
              <span className="tag" style={{background:'rgba(30,84,56,0.08)',color:'#1e5438',fontWeight:500}}
                    title={'Fulfills: ' + userFulfills.join(', ')}>
                ✓ {userFulfills.length} req{userFulfills.length !== 1 ? 's' : ''}
              </span>
            )}
            {onTagFulfills && !isPlaceholder && !isLocked && (
              <button onClick={(e) => { e.stopPropagation(); onTagFulfills(c); }}
                title="Mark what this course fulfills"
                style={{background:'transparent',border:'1px dashed rgba(21,32,26,0.2)',padding:'1px 5px',borderRadius:4,fontSize:'0.6rem',color:'#5a6b62',cursor:'pointer',fontFamily:'JetBrains Mono, monospace',letterSpacing:'0.05em',fontWeight:500}}
                onMouseEnter={e => { e.currentTarget.style.borderColor = '#1e5438'; e.currentTarget.style.color = '#1e5438'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(21,32,26,0.2)'; e.currentTarget.style.color = '#5a6b62'; }}>
                + tag
              </button>
            )}
          </div>
          <div className={`text-xs leading-snug mt-0.5 ml-4 ${isPlaceholder ? 'text-ink/55 italic' : 'text-ink/70'}`}>
            {c.title}
          </div>
          {c.note && !isPlaceholder && <div className="footnote mt-1 ml-4">{c.note}</div>}
          {isPlaceholder && c.fulfillsDesc && <div className="footnote mt-1 ml-4">{c.fulfillsDesc}</div>}
          {c.warning && <div className="footnote mt-1 ml-4" style={{borderColor:'#a51e22'}}>⚠ {c.warning}</div>}
        </div>
        <div className="cu-badge">{c.cu} CU</div>

        {/* Action affordances */}
        {isEditable && <span className="edit-hint" title="Click to swap this course">✎</span>}
        {isDraggable && !isEditable && <span className="edit-hint" title="Drag to another semester">⋮⋮</span>}
        {onDelete && !isLocked && (
          <span className="delete-hint" title="Remove this course"
                onClick={(e) => { e.stopPropagation(); onDelete(c); }}>×</span>
        )}
      </div>
    );
  };

  // ---- Semester Card ----
  const SemesterCard = ({ semKey, courses, total, gradYear, onEditCourse, onDrop, dragState, large, colorOverrides, onColorChange, onDelete, onEditCode, onAddCourse, onTagFulfills, userPlanFulfillments }) => {
    const { year, season } = semesterLabel(semKey, gradYear);
    const dualOverload = total > 5.5 && total <= 6.5;
    const needsApproval = total > 6.5 && total <= 7.5;
    const exceedsMax = total > 7.5;
    const light = total < S.TARGET_MIN;
    const totalColor = exceedsMax ? 'text-pennred'
                     : needsApproval ? 'text-pennred'
                     : dualOverload ? 'text-[#a37718]'
                     : light ? 'text-[#a37718]'
                     : 'text-forest-500';
    const [isDragOver, setIsDragOver] = useState(false);
    const canAccept = dragState?.active && dragState.fromSem !== semKey;
    return (
      <div className={`semester ${isDragOver && canAccept ? 'drop-target' : ''} ${large ? 'large' : ''}`}
           onDragOver={canAccept ? (e) => { e.preventDefault(); setIsDragOver(true); } : undefined}
           onDragLeave={canAccept ? () => setIsDragOver(false) : undefined}
           onDrop={canAccept ? (e) => { e.preventDefault(); setIsDragOver(false); onDrop?.(dragState.course, semKey); } : undefined}>
        <div className="semester-head">
          <div>
            <div className="label-tiny">{year}</div>
            <div className="font-display text-lg font-medium text-ink leading-tight mt-0.5">{season}</div>
          </div>
          <div className="text-right">
            <div className={`course-code font-semibold text-base ${totalColor}`}>
              {total.toFixed(1)}
            </div>
            <div className="label-tiny mt-0.5">CU</div>
          </div>
        </div>
        <div className="semester-body">
          {courses.length === 0 ? (
            <div className="text-xs italic text-inkMute text-center py-4">— empty —</div>
          ) : (
            courses.map((c, i) => {
              const courseKey = c.originalCode || c.code;
              const userFulfills = userPlanFulfillments?.[courseKey] || [];
              return (
                <CourseRow key={`${c.code}-${i}-${c.slotId || ''}`} c={c}
                  onEdit={c.slotId && c.isElective ? () => onEditCourse(c, semKey) : null}
                  canDrag={!!dragState}
                  isDragging={dragState?.course?.code === c.code && dragState?.fromSem === semKey}
                  onDragStart={dragState?.onStart ? (e, course) => dragState.onStart(e, course, semKey) : null}
                  onDragEnd={dragState?.onEnd}
                  userColor={colorOverrides?.[c.code] || colorOverrides?.[c.originalCode] || null}
                  onColorChange={onColorChange}
                  onDelete={onDelete}
                  onEditCode={onEditCode}
                  onTagFulfills={onTagFulfills}
                  userFulfills={userFulfills}
                />
              );
            })
          )}
          {onAddCourse && (
            <button onClick={() => onAddCourse(semKey)}
              style={{display:'flex',alignItems:'center',gap:6,width:'100%',marginTop:8,padding:'8px 10px',background:'transparent',border:'1px dashed #d4d4cd',borderRadius:6,color:'#5a6b62',fontSize:'0.78rem',cursor:'pointer',fontFamily:'inherit',transition:'all 140ms ease'}}
              onMouseEnter={e => { e.currentTarget.style.borderColor = '#1e5438'; e.currentTarget.style.color = '#1e5438'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = '#d4d4cd'; e.currentTarget.style.color = '#5a6b62'; }}>
              <span style={{fontSize:14,lineHeight:1}}>+</span>
              <span>Add course</span>
            </button>
          )}
        </div>
        <div className="semester-foot">
          <div className="label-tiny">{courses.length} courses</div>
          <div className="flex gap-1 flex-wrap justify-end">
            {exceedsMax && (
              <span className="tag" title="Exceeds Penn's 7.5 CU hard cap. Cannot register without school-level approval."
                    style={{background:'#a51e22',color:'#fff',fontWeight:600}}>
                EXCEEDS MAX
              </span>
            )}
            {needsApproval && !exceedsMax && (
              <span className="tag" title="Requires Faculty Advisor Sign-off form."
                    style={{background:'rgba(165,30,34,0.10)',color:'#a51e22',fontWeight:600}}>
                APPROVAL REQ'D
              </span>
            )}
            {dualOverload && (
              <span className="tag" title="Dual-degree overload — request on advance registration."
                    style={{background:'rgba(163,119,24,0.12)',color:'#a37718',fontWeight:500}}>
                OVERLOAD
              </span>
            )}
            {light && <span className="tag" style={{background:'#f0f0eb',color:'#5a6b62'}}>LIGHT</span>}
          </div>
        </div>
      </div>
    );
  };

  // ---- Requirement Tracker ----
  const RequirementTracker = ({ summary }) => {
    const complete = summary.meetsDualMin && summary.meetsEnergyReq && summary.unfulfilledFA.length === 0 && summary.unfulfilledSec.length === 0;
    return (
      <div>
        <div className="flex items-center justify-between mb-5">
          <h3 className="display-md text-ink">Degree progress</h3>
          <span className="label-tiny" style={{color: complete ? '#1e5438' : '#a37718'}}>
            {complete ? 'Complete' : 'Draft'}
          </span>
        </div>

        <div className="space-y-4">
          <ProgressItem label="Total CU (dual degree)" value={summary.totalCU} target={VIPER_PROGRAM.minTotalCU} />
          <ProgressItem label="BSE CU (min 37)"        value={summary.seasCU}  target={37} />
          <ProgressItem label="Energy courses"          value={summary.energyCoursesCount} target={3}
            warn={summary.energyCoursesCount < 3} />
          <div className="flex justify-between items-baseline pt-1">
            <span className="text-sm text-inkSoft">BA-contributing CU</span>
            <span className="course-code font-semibold">{summary.sasCU.toFixed(1)}</span>
          </div>
        </div>

        <div className="hairline my-6"></div>

        <div className="label-tiny mb-3">Foundational approaches</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-1.5 text-sm">
          {FA_REQUIREMENTS.map(fa => {
            const done = summary.fulfilledFA.includes(fa.id);
            return (
              <div key={fa.id} className="flex items-start gap-2">
                <span className="dot mt-1.5" style={{background: done ? '#1e5438' : 'transparent', border: done ? 'none' : '1.5px solid #d4d4cd'}}></span>
                <span className={done ? 'text-ink' : 'text-inkMute'}>{fa.label}</span>
              </div>
            );
          })}
        </div>

        <div className="hairline my-6"></div>

        <div className="label-tiny mb-3">College sectors</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-1.5 text-sm">
          {SECTORS.map(s => {
            const done = summary.fulfilledSec.includes(s.id);
            return (
              <div key={s.id} className="flex items-start gap-2">
                <span className="dot mt-1.5" style={{background: done ? '#1e5438' : 'transparent', border: done ? 'none' : '1.5px solid #d4d4cd'}}></span>
                <span className={done ? 'text-ink' : 'text-inkMute'}>{s.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  const ProgressItem = ({ label, value, target, warn }) => {
    const pct = Math.min(100, Math.round((value / target) * 100));
    const color = warn ? '#a51e22' : '#1e5438';
    return (
      <div>
        <div className="flex justify-between items-baseline mb-1.5">
          <span className="text-sm text-inkSoft">{label}</span>
          <span className="course-code font-semibold text-ink">{typeof value === 'number' ? value.toFixed(1) : value}<span className="text-inkMute"> / {target}</span></span>
        </div>
        <div style={{height:4,background:'#f0f0eb',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:color,transition:'width 280ms ease'}}></div>
        </div>
      </div>
    );
  };

  // ---- Double-Count Panel ----
  const DoubleCountNotes = ({ plan, gradYear }) => {
    const doubles = [];
    Object.entries(plan.semesters).forEach(([k, cs]) => {
      cs.forEach(c => { if (c.isDouble) doubles.push({ ...c, sem: k }); });
    });
    return (
      <div>
        <div className="flex items-center justify-between mb-4">
          <h3 className="display-md text-ink">Double-counting</h3>
          <span className="label-tiny" style={{color:'#a51e22'}}>{doubles.length} courses</span>
        </div>
        <p className="text-sm text-inkSoft leading-relaxed mb-5">
          Courses below fulfill requirements for both the BA and BSE, or double-count an FA with a Sector. Penn allows double-counting between FA↔Sector and FA/Sector↔Major.
        </p>
        {doubles.length === 0 ? (
          <div className="text-sm text-inkMute">No double-counts detected.</div>
        ) : (
          <div className="space-y-1.5">
            {doubles.map((c, i) => {
              const { short } = semesterLabel(c.sem, gradYear);
              return (
                <div key={i} className="flex items-baseline gap-3 text-sm py-1.5">
                  <span className="course-code text-forest-500">{c.code}</span>
                  <span className="flex-1 text-ink truncate">{c.title}</span>
                  <span className="label-tiny" style={{color:'#a51e22'}}>{short}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ---- Notes Panel ----
  const NotesPanel = ({ plan }) => {
    const warnings = plan.notes.filter(n => n.level === 'warning');
    const policies = plan.notes.filter(n => n.level === 'policy');
    const infos    = plan.notes.filter(n => !n.level || n.level === 'info');
    if (warnings.length + policies.length + infos.length === 0) return null;

    const renderGroup = (title, color, items) => items.length === 0 ? null : (
      <div className="mb-5 last:mb-0">
        <div className="label-tiny mb-2" style={{color}}>{title}</div>
        <div className="space-y-2">
          {items.map((n, i) => (
            <div key={i} className="flex gap-3 text-sm leading-relaxed text-inkSoft">
              <span className="course-code flex-shrink-0" style={{fontSize:'0.7rem',color}}>{n.src}</span>
              <span>{n.text}</span>
            </div>
          ))}
        </div>
      </div>
    );

    return (
      <div>
        <h3 className="display-md text-ink mb-5">Notes</h3>
        {renderGroup('Warnings', '#a51e22', warnings)}
        {renderGroup('Policy',   '#a37718', policies)}
        {renderGroup('Info',     '#1e5438', infos)}
      </div>
    );
  };

  // ---- AP Credit Picker ----
  const APCreditPicker = ({ ids, setIds, gradYear }) => {
    const toggle = (id) => setIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    return (
      <div>
        <div className="space-y-1.5 scrollable" style={{ maxHeight: 260 }}>
          {AP_CREDITS.map(c => {
            const note = typeof c.note === 'function' ? c.note(gradYear) : c.note;
            return (
              <label key={c.id} className={`checkbox-card ${ids.includes(c.id) ? 'checked' : ''}`}>
                <input type="checkbox" checked={ids.includes(c.id)} onChange={() => toggle(c.id)} />
                <div className="flex-1">
                  <div className="text-xs font-semibold text-ink">{c.label}</div>
                  <div className="text-[11px] text-ink/60 leading-snug mt-0.5">{note}</div>
                </div>
              </label>
            );
          })}
        </div>
      </div>
    );
  };

  // ---- Elective Picker Modal ----
  const ElectivePicker = ({ course, semKey, plan, onClose, onSelect, gradYear }) => {
    if (!course) return null;
    const slot = { id: course.slotId, label: course.slotLabel || course.title, pool: course.pool || [], energy: course.isEnergy };
    const candidates = useMemo(() => S.electivesForSlot(slot, plan), [slot, plan]);
    const [selected, setSelected] = useState(null);

    const { season } = semesterLabel(semKey, gradYear);

    return (
      <div onClick={onClose}
           style={{position:'fixed',inset:0,background:'rgba(10,14,12,0.30)',zIndex:60,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',backdropFilter:'blur(4px)'}}>
        <div onClick={e => e.stopPropagation()}
             style={{background:'#fff',borderRadius:'16px',maxWidth:'560px',width:'100%',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(0,0,0,0.18)'}}>
          <div style={{padding:'24px 24px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'16px',borderBottom:'1px solid #f0f0eb'}}>
            <div>
              <div className="label-tiny mb-1">Pick a course</div>
              <h3 className="display-md text-ink">{course.slotLabel || course.title}</h3>
              <div className="text-xs text-inkSoft mt-1">{season} · currently <span className="course-code">{course.code}</span></div>
            </div>
            <button onClick={onClose} className="btn-icon" aria-label="Close">×</button>
          </div>
          <div className="scrollable" style={{padding:'16px 24px',flex:1}}>
            {candidates.length === 0 ? (
              <div className="text-sm text-inkSoft text-center py-8">No pre-configured alternatives. Pick a course on Path@Penn that fits this requirement.</div>
            ) : (
              <div className="space-y-1">
                {candidates.map(c => (
                  <div key={c.code}
                       onClick={() => setSelected(c.code)}
                       style={{padding:'12px 14px',borderRadius:'10px',cursor:'pointer',border:`1px solid ${selected === c.code ? '#1e5438' : '#e8e8e3'}`,background: selected === c.code ? 'rgba(30,84,56,0.04)' : '#fff',transition:'all 140ms ease'}}>
                    <div className="flex items-baseline gap-2 flex-wrap">
                      <span className="course-code text-forest-500">{c.code}</span>
                      <span className="flex-1 text-sm text-ink">{c.title}</span>
                      <span className="tag" style={{background:c.reason==='Energy'?'rgba(163,119,24,0.12)':'#f0f0eb',color:c.reason==='Energy'?'#a37718':'#5a6b62'}}>{c.reason}</span>
                      <span className="cu-badge">{c.cu} CU</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{padding:'16px 24px',borderTop:'1px solid #f0f0eb',display:'flex',justifyContent:'flex-end',gap:'10px'}}>
            <button className="btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn" disabled={!selected}
              onClick={() => { onSelect(course.slotId, selected); onClose(); }}>
              Use {selected || '—'}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ---- Concentration Picker ----
  const ConcentrationPicker = ({ majorKey, value, onChange }) => {
    const major = MAJORS[majorKey];
    if (!major) return null;
    const concs = Object.entries(major.concentrations || {});
    if (concs.length <= 1) {
      return <div className="text-xs text-inkSoft mt-1 italic">{concs[0]?.[1].label || 'Standard concentration'}</div>;
    }
    return (
      <div>
        <select value={value} onChange={e => onChange(e.target.value)}>
          {concs.map(([k, c]) => (
            <option key={k} value={k}>
              {c.label}{c.default ? ' (default)' : ''}
            </option>
          ))}
        </select>
        {major.concentrations[value]?.note && (
          <div className="text-xs text-inkSoft mt-1.5 italic leading-snug">{major.concentrations[value].note}</div>
        )}
      </div>
    );
  };

  // ---- Common Double-Counts Reference ----
  const CommonDoubleCountsPanel = () => (
    <div>
      <h3 className="display-md text-ink mb-2">Popular double-counting courses</h3>
      <p className="text-sm text-inkSoft mb-5 leading-relaxed">
        SAS courses that fulfill multiple requirements at once — useful when you have flexibility in SS/H picks.
      </p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2.5">
        {COMMON_DOUBLE_COUNTS.map((c, i) => (
          <div key={i} className="flex items-start gap-2.5 py-2 border-b border-line">
            <span className="course-code text-forest-500 flex-shrink-0">{c.code}</span>
            <div className="flex-1 min-w-0">
              <div className="text-sm text-ink leading-snug">{COURSES[c.code]?.title || '—'}</div>
              <div className="text-xs text-inkSoft mt-0.5">{c.fulfills.join(' · ')}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  const EnergyCourseBank = () => {
    const rows = D.ENERGY_COURSES.map(code => {
      const c = COURSES[code];
      if (!c) return null;
      return { code, ...c };
    }).filter(Boolean);
    return (
      <details>
        <summary className="flex items-center justify-between">
          <h3 className="display-md text-ink">VIPER-approved energy courses</h3>
          <span className="label-tiny" style={{color:'#a37718'}}>{rows.length} options · <span className="chevron">›</span></span>
        </summary>
        <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-1.5">
          {rows.map(c => (
            <div key={c.code} className="flex items-baseline gap-2 py-1.5 border-b border-line text-sm">
              <span className="course-code text-forest-500">{c.code}</span>
              <span className="flex-1 text-ink truncate">{c.title}</span>
            </div>
          ))}
        </div>
      </details>
    );
  };

  const Legend = ({ compact }) => {
    const items = [
      { color: '#a51e22', label: 'Double-counts (BA + BSE)' },
      { color: '#0f3021', label: 'VIPR (program)' },
      { color: '#a37718', label: 'BA (College) only' },
      { color: '#3d7d5e', label: 'BSE (Engineering) only' },
      { color: '#d4d4cd', label: 'Gen-ed' },
    ];
    const tags = [

  function computeSEASGenElectives(plan, viperMods) {
    const mods = normalizeViperMods(viperMods);
    // The 7 SEAS slots
    const requirements = [
      { id: 'seas-ethics',  label: 'Ethics',          fillsByVIPR: true,  filledBy: 'VIPR 1200/1210', satisfied: true },

    ];

    // Look at what College gen-eds the student is taking — these overlap into
    // SEAS SS/H slots automatically. Each College SS or H course counts toward
    // one SEAS SS/H slot.
    let sshOverlapCount = 0;
    for (const sem of Object.values(plan.semesters)) {
      for (const c of sem) {
        if (c.category !== 'gened') continue;
        const slotId = c.slotId || '';
        // Foundation courses (Kite, P&D) count for SEAS SS/H if they're H or SS
        // Distribution slots count too.
        const intentDiv = c.intent?.distribution;
        if (intentDiv === 'SS' || intentDiv === 'H') {

        }
        // VIPR 1300 with the doubleCountVIPR1300 mod also counts as SS for SEAS
        if (slotId === 'ncc-pad' || slotId === 'ncc-kite') {

    }

    let toFill = Math.min(5, sshOverlapCount);
    for (let i = 2; i < 2 + toFill; i++) {
      requirements[i].satisfied = true;
      requirements[i].filledBy = 'College gen-ed (overlap)';
    }

    const satisfiedCount = requirements.filter(r => r.satisfied).length;
    const remainingCount = requirements.length - satisfiedCount;

    return {
      requirements,
      total: requirements.length,
      satisfied: satisfiedCount,

  /**
   * Policy-level NCC workload. This is the view we use for the Michelle-aligned
   * sandbox: how many CU of "non-major" work does the student actually do under
   * a given mod configuration, broken into Foundations + Distribution.
   *
   * Per Michelle's framing (May '26):
   *   Foundations alone = 5–7 CU baseline
   *     Kite (1) + Key (1) + FYS (1) + Writing (1) + P&D (1) + Lang (0–2)
   *   Distribution beyond Foundations = (targets.SS + targets.H) CU
   *     (Natural Sciences target is fully covered by majors; not user work.)
   *   Total non-major CU = Foundations + Distribution-not-overlapping-Foundations
   *   Mods reduce this by waiving Foundations, double-counting, or overlapping
   *   into the distribution targets.
   */
  function computeNCCWorkload(plan, targets, viperMods) {
    const mods = normalizeViperMods(viperMods);

    // ---- Foundations ----
    // Each Foundation = 1 CU unless waived. Language is 0–2 CU; if not waived
    // we model it as 1 CU (one course typical for a single semester of language).
    const foundations = [
      { id: 'kite',  label: 'Kite',                   cu: 1, waived: !!(mods.kiteFullWaiver || mods.viprKiteWaiver), waivedBy: mods.viprKiteWaiver ? 'VIPR 1300' : (mods.kiteFullWaiver ? 'committee waiver' : null) },
      { id: 'key',   label: 'Key',                    cu: 1, waived: !!mods.keyWaiver,        waivedBy: mods.keyWaiver  ? 'VIPR 1200/1210' : null },
      { id: 'fys',   label: 'First-Year Seminar',     cu: 1, waived: !!mods.fysWaiver,        waivedBy: mods.fysWaiver  ? 'VIPR 1200/1210' : null },
      { id: 'writ',  label: 'Writing Seminar',        cu: 1, waived: false },
      { id: 'pad',   label: 'Perspectives & Diff.',   cu: 1, waived: !!mods.pdWaiver,         waivedBy: mods.pdWaiver   ? 'VIPR 1300' : null },
      { id: 'lang',  label: 'Foreign Language',       cu: 1, waived: !!mods.langWaiver,       waivedBy: mods.langWaiver ? 'committee waiver' : null },
    ];

    const foundationCU = foundations.reduce((s, f) => s + (f.waived ? 0 : f.cu), 0);

    // ---- Distribution (5+3 = 8 baseline, configurable via targets) ----
    // The student needs targets.SS CU in primary track + targets.H CU in
    // secondary track. Each double-count mod reduces this by 1 CU.
    const ssTarget = targets.SS;
    const hTarget  = targets.H;
    const distGrossCU = ssTarget + hTarget;

    // Apply double-counts. These are "savings" — they turn a gen-ed CU into a
    // course that's already being taken (Kite, Writing, VIPR 1300).
    let distSavedCU = 0;
    const distOverlaps = [];
    if (mods.doubleCountKite && !foundations.find(f => f.id === 'kite').waived) {
      distSavedCU += 1;
      distOverlaps.push({ from: 'Kite Foundation', toward: 'H', cu: 1 });
    }
    if (mods.doubleCountWriting) {
      distSavedCU += 1;
      distOverlaps.push({ from: 'Writing Foundation', toward: 'H', cu: 1 });
    }
    if (mods.doubleCountVIPR1300) {
      // VIPR 1300 totals 2.5 CU across 5 semesters. Cap at 2 CU per Michelle's
      // framing ("up to 2 CUs").
      distSavedCU += 2;
      distOverlaps.push({ from: 'VIPR 1300 (2 of 2.5 CU)', toward: 'SS', cu: 2 });
    }

    const distNetCU = Math.max(0, distGrossCU - distSavedCU);

    // ---- A&S CU waiver ----
    // Existing VIPER policy: up to 3 of 36 BA CUs waivable upon audit. This
    // doesn't reduce gen-ed work directly but reduces total degree CU minimum.
    const aandsWaiverSaves = mods.aandsCUWaiver ? 3 : 0;

    // ---- Totals ----
    const totalCU       = foundationCU + distNetCU;
    const baselineCU    = 6 + (ssTarget + hTarget); // 6 Foundations (no Lang waiver) + full distribution
    const reductionCU   = baselineCU - totalCU;

    return {
      foundations,
      foundationCU,
      foundationsWaivedCount: foundations.filter(f => f.waived).length,
      distGrossCU,
      distSavedCU,
      distNetCU,
      distOverlaps,
      ssTarget,
      hTarget,
      aandsWaiverSaves,
      totalCU,
      baselineCU,
      reductionCU,
      // Target ranges from Michelle:
      //   Goal: reduce baseline by 4–6 CU
      //   Therefore acceptable target = baseline – 6 ... baseline – 4
      goalReductionMin: 4,
      goalReductionMax: 6,
      meetsGoal: reductionCU >= 4,
    };
  }

  // Compute the "no-mods baseline" gen-ed count for comparison.
  // Under pure NCC without VIPER modifications:
  //   6 Foundations (Writing, FYS, Key, Kite, P&D, Language) +
  //   Distribution fillers beyond major coverage:
  //     SS target CU (none of which double-count a VIPER course) +
  //     H target CU (none of which double-count a Foundation)
  function baselineGenEdCount(targets) {
    const foundations = 6;
    const ssFillers = targets.SS;
    const hFillers = targets.H;
    return foundations + ssFillers + hFillers;
  }

  function computeNCCDistribution(plan, targets, viperMods) {
    const mods = normalizeViperMods(viperMods);
    const cuByDiv = { N: 0, SS: 0, H: 0 };

    for (const sem of Object.values(plan.semesters)) {
      for (const c of sem) {
        // Use slot intent first (Foundation slots declare division).
        // Intent-division only applies if the underlying mod is enabled.
        const slotId = c.slotId;
        const intentDiv = c.intent?.distribution;
        if (intentDiv && cuByDiv[intentDiv] !== undefined) {
          // Writing slot counts toward H only if doubleCountWriting is on;
          // otherwise Writing is a Foundation only (doesn't count toward Distribution).
          if (slotId === 'ncc-writ' && !mods.doubleCountWriting) {
            // Skip — Writing doesn't count toward distribution without the mod
          } else if (slotId === 'ncc-kite' && !mods.doubleCountKite) {
            // Kite still counts toward H distribution via prefix; but without mod,
            // Kite picks up the prefix-based division like any humanities course.
            // Since the slot has intent.distribution='H', and the mod isn't on,
            // we fall through to default H accounting if the picked course has H prefix.
            // For placeholder, assume H.
            cuByDiv.H += c.cu;
          } else {
            cuByDiv[intentDiv] += c.cu;
          }
          continue;
        }
        // VIPER mod: VIPR 1300 CUs → SS distribution (only if doubleCountVIPR1300)
        if (c.code === 'VIPR 1300' && mods.doubleCountVIPR1300) {
          cuByDiv.SS += c.cu;
          continue;
        }
        // VIPR 1200/1210 count toward N (Natural Sciences) when NOT waiving FYS/Key
        // (they're program-specific courses but give quantitative/scientific exposure)
        if (c.code === 'VIPR 1200' && !mods.fysWaiver) {
          cuByDiv.N += c.cu;
          continue;
        }
        if (c.code === 'VIPR 1210' && !mods.keyWaiver) {
          cuByDiv.N += c.cu;
          continue;
        }
        // Otherwise use prefix-based division
        const div = divisionForCode(c.code);
        if (div && cuByDiv[div] !== undefined) cuByDiv[div] += c.cu;
      }
    }

    return {
      cuByDiv,
      targets,
      meetsAll: (cuByDiv.N >= targets.N) && (cuByDiv.SS >= targets.SS) && (cuByDiv.H >= targets.H),
      shortfall: {
        N:  Math.max(0, targets.N  - cuByDiv.N),
        SS: Math.max(0, targets.SS - cuByDiv.SS),
        H:  Math.max(0, targets.H  - cuByDiv.H),
      },
    };
  }

  // ---- Run constraint checks for NCC mode ----
  // Returns an array of { severity: 'error'|'warning'|'info', msg: string } entries.
  function runNCCChecks(plan, targets, viperMods) {
    const mods = normalizeViperMods(viperMods);
    const anyMod = Object.values(mods).some(v => v);
    const checks = [];

    // Foundation satisfaction — each foundation checked against its own mod
    for (const f of NCC_FOUNDATIONS) {
      // Check mod-based waivers
      if (f.id === 'ncc-fys' && mods.fysWaiver) continue;
      if (f.id === 'ncc-key' && mods.keyWaiver) continue;
      if (f.id === 'ncc-lang' && mods.langWaiver) continue;
      if (f.id === 'ncc-pad' && mods.pdWaiver) continue;
      if (f.id === 'ncc-kite' && mods.kiteFullWaiver) continue;

      const satisfiedByViper = f.satisfiedByViper && plan.placement[f.satisfiedByViper.code];
      const slotPlaced = Object.values(plan.semesters).flat().some(c => c.slotId === f.id);
      if (!satisfiedByViper && !slotPlaced) {
        checks.push({
          severity: 'error',
          source: 'Foundation',
          msg: `${f.label}: not fulfilled. ${anyMod ? '' : 'Without any VIPER modifications, this requires a standalone course.'}`,
        });
      }
    }

    // Distribution targets
    const dist = computeNCCDistribution(plan, targets, mods);
    for (const key of ['N', 'SS', 'H']) {
      const short = dist.shortfall[key];
      if (short > 0) {
        checks.push({
          severity: 'warning',
          source: 'Distribution',
          msg: `${divLabel(key)}: ${dist.cuByDiv[key].toFixed(1)} / ${targets[key]} CU (need ${short.toFixed(1)} more).`,
        });
      }
    }

    // BA minimum (36 CU under NCC, minus VIPER audit waiver if enabled)
    const baMin = 36 - (mods.aandsCUWaiver ? 3 : 0);
    const baCU = plan.summary?.sasCU || 0;
    if (baCU < baMin) {
      checks.push({
        severity: 'warning',
        source: 'BA minimum',
        msg: `BA CU: ${baCU.toFixed(1)} / ${baMin}. ${mods.aandsCUWaiver ? 'VIPER audit waiver of up to 3 CU applied.' : 'Without audit waiver, full 36 CU required.'}`,
      });
    }

    // Semester ceiling — tiered per Penn policy
    for (const [sem, cu] of Object.entries(plan.loads || {})) {
      const label = D.semesterLabel(sem).season;
      if (cu > 7.5) {
        checks.push({
          severity: 'error',
          source: 'Policy max',
          msg: `${label}: ${cu} CU exceeds Penn's 7.5 CU university-wide hard cap. Requires school-level approval or a summer course.`,
        });
      } else if (cu > 6.5) {
        checks.push({
          severity: 'warning',
          source: 'Approval required',
          msg: `${label}: ${cu} CU requires Faculty Advisor Sign-off (SEAS) or CU increase request (College).`,
        });
      } else if (cu > 5.5) {
        checks.push({
          severity: 'warning',
          source: 'Dual overload',
          msg: `${label}: ${cu} CU — expected VIPER dual-degree overload; still requires form.`,
        });
      }
    }

    // Force-placed courses (required courses that had to be placed over-cap)
    if (plan.summary?.exceedsMaxCourses?.length) {
      for (const c of plan.summary.exceedsMaxCourses) {
        const label = D.semesterLabel(c.sem).season;
        checks.push({
          severity: 'error',
          source: 'Force-placed',
          msg: `${c.code || 'Foundation slot'} (${c.title}) had to be placed in ${label} above policy max — this is what would need curriculum committee approval.`,
        });
      }
    }

    // If no issues
    if (checks.length === 0) {
      checks.push({ severity: 'info', source: 'Status', msg: 'All NCC requirements met; no constraint violations.' });
    }
    return checks;
  }

  function divLabel(key) {
    return key === 'N' ? 'Natural Sciences' : key === 'SS' ? 'Social Sciences' : 'Humanities & Arts';
  }

  // ---- Expose data/helper API ----
  window.NCC = {
    NCC_FOUNDATIONS,
    NCC_GENED_SLOTS,
    DEFAULT_VIPER_MODS,
    MOD_DEFINITIONS,
    MOD_PRESETS,
    divisionForCode,
    divLabel,
    computeNCCDistribution,
    computeNCCWorkload,
    computeSEASGenElectives,
    runNCCChecks,
    normalizeViperMods,
    countGenEds,
    baselineGenEdCount,
  };
})();

/* ============================================================================
   SECTION 4: MAIN APP — Apple-clean rewrite (May '26)

   Architecture (revised May '26):
   - The user owns the plan. The scheduler is a seed generator that runs
     once when major/AP/year selection changes, producing a starting plan.
   - After that, all edits flow directly through userPlan state — no
     re-scheduling, no prereq enforcement, no surprise course movements.
   - Each course in userPlan keeps its own slot/category metadata so the
     NCC tracker can still report correctly. Unknown user-added courses
     show as ambiguous until the user marks what they fulfill.
   ============================================================================ */

/* ─── augmentPlan ────────────────────────────────────────────────────
   Takes the user-owned plan {semesters: {fall-y1: [...], ...}} and adds
   the summary/loads/etc. that the scheduler used to compute. Pure
   function — no state, no side effects.

   This is what closes the gap left by retiring the scheduler. The
   scheduler used to compute these on the way to building the plan; now
   we compute them from the plan itself.
─────────────────────────────────────────────────────────────────── */
function augmentPlan(userPlan, ctx) {
  const D = window.DATA;
  if (!userPlan || !userPlan.semesters) return null;
  const SEMS = D.SEMESTER_KEYS;
  const fulfillmentMap = ctx.userPlanFulfillments || {};

  // First, copy semesters and inject user-marked fulfillments
  const semesters = {};
  for (const k of SEMS) {
    const courses = userPlan.semesters[k] || [];
    semesters[k] = courses.map(c => {
      const key = c.originalCode || c.code;
      const userMarks = fulfillmentMap[key] || [];
      if (userMarks.length === 0) return c;
      // Build an intent object aggregating the user's marks
      const intent = { ...(c.intent || {}) };
      for (const id of userMarks) {
        if (id.startsWith('ncc-distrib-')) {
          const div = id.replace('ncc-distrib-', '').toUpperCase();
          intent.distribution = div;
        } else if (id === 'ncc-kite') intent.foundation = 'ncc-kite';
        else if (id === 'ncc-key')   intent.foundation = 'ncc-key';
        else if (id === 'ncc-fys')   intent.foundation = 'ncc-fys';
        else if (id === 'ncc-writ')  intent.foundation = 'ncc-writ';
        else if (id === 'ncc-pad')   intent.foundation = 'ncc-pad';
        else if (id === 'ncc-lang')  intent.foundation = 'ncc-lang';
      }
      return { ...c, intent, userFulfills: userMarks };
    });
  }

  const summary = {
    totalCU: 0,
    sasCU: 0,
    seasCU: 0,
    energyCoursesCount: 0,
    doubleCountedCodes: [],
    meetsDualMin: false,
    meetsEnergyReq: false,
    fulfilledFA: [],
    unfulfilledFA: [],
    fulfilledSec: [],
    unfulfilledSec: [],
    overloadSemesters: [],
    approvalSemesters: [],
    exceedsMaxSemesters: [],
    exceedsMaxCourses: [],
  };
  const loads = {};
  for (const k of SEMS) loads[k] = 0;

  // CU totals + load classification
  const TARGET_MAX = 6.5, TARGET_HARD_CAP = 7.5;
  for (const k of SEMS) {
    const courses = semesters[k];
    let sem = 0;
    for (const c of courses) {
      sem += c.cu || 0;
      summary.totalCU += c.cu || 0;
      if (c.category === 'sas' || c.category === 'both' || c.category === 'viper' || c.category === 'gened') {
        summary.sasCU += c.cu || 0;
      }
      if (c.category === 'seas' || c.category === 'both' || c.category === 'viper') {
        summary.seasCU += c.cu || 0;
      }
      if (c.isEnergy) summary.energyCoursesCount += 1;
      if (c.isDouble) summary.doubleCountedCodes.push(c.originalCode || c.code);
      if (c.tags && c.tags.includes('EXCEEDS-MAX')) {
        summary.exceedsMaxCourses.push(c.originalCode || c.code);
      }
    }
    loads[k] = sem;
    if (sem > TARGET_HARD_CAP) summary.exceedsMaxSemesters.push(k);
    else if (sem > TARGET_MAX) summary.approvalSemesters.push(k);
    else if (sem > 5.5)        summary.overloadSemesters.push(k);
  }

  summary.meetsDualMin = summary.totalCU >= (D.VIPER_PROGRAM?.minTotalCU || 40);
  summary.meetsEnergyReq = summary.energyCoursesCount >= 3;

  // FA + Sector fulfillment — derived from course tags
  const FAs = D.FA_REQUIREMENTS || [];
  const SECs = D.SECTORS || [];
  const allCourses = SEMS.flatMap(k => semesters[k]);
  for (const fa of FAs) {
    const hit = allCourses.some(c => (c.fulfills?.fa === fa.id) || c.intent?.fa === fa.id);
    if (hit) summary.fulfilledFA.push(fa.id);
    else     summary.unfulfilledFA.push(fa.id);
  }
  for (const sec of SECs) {
    const hit = allCourses.some(c => (c.fulfills?.sec === sec.id) || c.intent?.sec === sec.id);
    if (hit) summary.fulfilledSec.push(sec.id);
    else     summary.unfulfilledSec.push(sec.id);
  }

  return { semesters, loads, summary, meta: ctx, notes: [] };
}
const App = () => {
  // ---- Plan configuration (persistent state) ----
  const [sasMajorKey,  setSasMajorKey]  = useState('CHEM');
  const [sasConcKey,   setSasConcKey]   = useState('STANDARD');

  // ---- User-owned plan (post-seed) ----
  // The scheduler runs ONCE on initial mount (or when the user explicitly
  // resets to the major template). After that, this is the source of truth.
  // Edits (drag, add, delete, rename) mutate userPlan directly — no
  // re-scheduling, no prereq enforcement, no surprise course movements.
  const [userPlan, setUserPlan] = useState(null);
  const [userPlanFulfillments, setUserPlanFulfillments] = useState({}); // courseKey → Set<fulfillment-id>
  const [userColorOverrides,   setUserColorOverrides]   = useState({});
  const [seedSignature, setSeedSignature] = useState('');

  // ---- NCC ----
  const [curriculumMode,    setCurriculumMode]    = useState('legacy');
  const [viperMods, setViperMods] = useState(() =>
    window.NCC ? { ...window.NCC.DEFAULT_VIPER_MODS } : {}
  );
  const [distributionTargets, setDistributionTargets] = useState({ N: 12, SS: 5, H: 3 });

  // ---- UI state ----
  const [layout, setLayout] = useState('grid');
  const [editing, setEditing] = useState(null);          // ElectivePicker target
  const [addingTo, setAddingTo] = useState(null);        // AddCourse target semKey
  const [taggingCourse, setTaggingCourse] = useState(null); // Fulfillment picker target
  const [dragging, setDragging] = useState(null);
  const [setupOpen, setSetupOpen] = useState(false);
  const [sandboxOpen, setSandboxOpen] = useState(false);
  const [exportMenuOpen, setExportMenuOpen] = useState(false);
  const fileInputRef = useRef(null);

  // ---- Hoist data refs ----
  const D = window.DATA;
  const S = window.SCHEDULER;
  const UI = window.UI;
  const N = window.NCC;
  const NUI = window.NCC_UI;
  const { MAJORS } = D;
  const SAS_MAJORS  = Object.fromEntries(Object.entries(MAJORS).filter(([_, m]) => m.school === 'SAS'));
  const SEAS_MAJORS = Object.fromEntries(Object.entries(MAJORS).filter(([_, m]) => m.school === 'SEAS'));
  const sasMajor  = MAJORS[sasMajorKey];
  const seasMajor = MAJORS[seasMajorKey];
  const sasConc   = sasMajor?.concentrations?.[sasConcKey]  || sasMajor?.concentrations?.STANDARD || {};
  const seasConc  = seasMajor?.concentrations?.[seasConcKey] || seasMajor?.concentrations?.STANDARD || {};

  // ---- Seed generation ----
  // The scheduler is now a *seed generator*. It runs when major selection,
  // graduating year, AP credits, or curriculum mode changes — these are
  // "build a fresh plan" signals. Within a single seed, edits flow through
  // userPlan and are not re-scheduled.
  const seedKey = `${sasMajorKey}|${sasConcKey}|${seasMajorKey}|${seasConcKey}|${apCreditIds.sort().join(',')}|${gradYear}|${curriculumMode}|${shiftForward}|${genedDistribution}|${JSON.stringify(distributionTargets)}|${JSON.stringify(viperMods)}`;

  const seedPlan = useMemo(() => S.buildPlan({
    sasMajorKey, sasConcKey, seasMajorKey, seasConcKey,
    apCreditIds, electiveOverrides: {}, customPlacements: {}, deletedCourses: [],
    curriculumMode, viperMods, shiftForward, genedDistribution,
    distributionTargets, gradYear,
  }), [seedKey]);

  // Auto-seed when seedKey changes (and userPlan hasn't been initialized for it yet)
  useEffect(() => {
    if (!seedPlan) return;
    if (seedSignature === seedKey) return; // already seeded for this signature
    // Seed userPlan from scheduler output, deep-copying so edits don't mutate seedPlan
    const semesters = {};
    for (const [k, courses] of Object.entries(seedPlan.semesters)) {
      semesters[k] = courses.map(c => ({ ...c }));
    }
    setUserPlan({ semesters });
    // Reset fulfillments tracker — they'll be re-derived from course data
    setUserPlanFulfillments({});
    setSeedSignature(seedKey);
  }, [seedKey, seedPlan, seedSignature]);

  // Build the *display plan* — userPlan with computed summary, loads, and
  // augmented metadata. This is what gets rendered. If userPlan is null
  // (first render before seed completes), fall back to seedPlan.
  const plan = useMemo(() => {
    const source = userPlan || seedPlan;
    if (!source) return null;
    return augmentPlan(source, { sasMajorKey, seasMajorKey, gradYear, viperMods, distributionTargets, userPlanFulfillments });
  }, [userPlan, seedPlan, sasMajorKey, seasMajorKey, gradYear, viperMods, distributionTargets, userPlanFulfillments]);

  // ────────────────────────────────────────────────────────────────
  //  PLAN MUTATIONS — all edits flow through these. The scheduler is
  //  NOT consulted; the user is the source of truth after the seed.
  // ────────────────────────────────────────────────────────────────

  // Identify a course in userPlan. Returns { semKey, index } or null.
  const findCourse = (plan, predicate) => {
    if (!plan) return null;
    for (const [k, courses] of Object.entries(plan.semesters)) {
      const i = courses.findIndex(predicate);
      if (i >= 0) return { semKey: k, index: i };
    }
    return null;
  };

  // Match a course by its stable identity. Placeholders use slotId; real
  // courses use originalCode || code.
  const courseMatches = (course) => (c) => {
    if (course.slotId && c.slotId) return c.slotId === course.slotId;
    const tk = course.originalCode || course.code;
    const ck = c.originalCode || c.code;
    return tk === ck;
  };

  // Generic mutator — applies a function to userPlan and updates state.
  const mutate = (fn) => {
    setUserPlan(prev => {
      if (!prev) return prev;
      const next = { semesters: {} };
      for (const [k, courses] of Object.entries(prev.semesters)) {
        next.semesters[k] = courses.map(c => ({ ...c })); // shallow-copy each course
      }
      fn(next);
      return next;
    });
  };

  // ---- Handlers ----

  // Rename: stores `displayCode` alongside `code`. Scheduler-era prereqs are
  // gone, so we can just rewrite `code` directly. We keep `originalCode` so
  // the user can see what it was renamed from.
  const handleEditCode = useCallback((course) => {
    if (!course || course.isPlaceholder) return;
    if (course.category === 'viper' && course.fixed) {
      alert('VIPR courses are required by the program and cannot be renamed.');
      return;
    }
    const original = course.originalCode || course.code;
    if (!original || original === '—') return;
    const next = prompt(`Rename "${course.code}" — enter a different course code:`, course.code);
    if (next == null) return;
    const trimmed = next.trim();
    if (!trimmed) return;
    mutate(plan => {
      const loc = findCourse(plan, courseMatches(course));
      if (!loc) return;
      const c = plan.semesters[loc.semKey][loc.index];
      c.code = trimmed;
      if (!c.originalCode) c.originalCode = original;
      c.isRenamed = trimmed !== c.originalCode;
    });
  }, []);

  // Delete: just remove from the semester. No "deletedCourses" tracking needed
  // since there's no scheduler trying to re-add it.
  const handleDeleteCourse = useCallback((course) => {
    if (!course) return;
    if (course.category === 'viper' && course.fixed) {
      alert('VIPR courses are required by the program and cannot be removed.');
      return;
    }
    const label = course.code === '—' ? course.title : course.code;
    if (!confirm(`Remove ${label} from your plan?`)) return;
    mutate(plan => {
      const loc = findCourse(plan, courseMatches(course));
      if (!loc) return;
      plan.semesters[loc.semKey].splice(loc.index, 1);
    });
  }, []);

  // Color change (display-only, stored separately from userPlan)
  const handleColorChange = useCallback((code, color) => {
    setUserColorOverrides(prev => {
      const next = { ...prev };
      if (color == null) delete next[code];
      else next[code] = color;
      return next;
    });
  }, []);

  // Add a course to a specific semester (called by AddCourseModal)
  const handleAddCourse = useCallback((semKey, course) => {
    if (!semKey || !course) return;
    mutate(plan => {
      if (!plan.semesters[semKey]) plan.semesters[semKey] = [];

        code: course.code,
        title: course.title,
        cu: course.cu,
        category: course.category || 'gened',
        isElective: false,
        isPlaceholder: false,
        isUserAdded: true,
        tags: ['USER-ADDED'],

    // If the user marked a fulfillment, record it

      const key = course.code;

        ...prev,

      const current = prev[key] || [];

      // Add to new semester

    // New v8 state: full userPlan, fulfillments, colors
    if (state.userPlan && state.userPlan.semesters) {

  // eslint-disable-next-line
  }, []);

  const hasEdits = (() => {

    // Compare course counts per semester — quick approximation
    for (const k of D.SEMESTER_KEYS) {
      const u = userPlan.semesters[k] || [];

      for (let i = 0; i < u.length; i++) {

      }

  // ─────────────────────────────────────────────────────────────────────

  if (!plan) {

  }

  const summary = plan.summary;

  return (
    <>
      {/* ─── HEADER ─── */}
      <header className="no-print" style={{position:'sticky',top:0,zIndex:20,background:'rgba(253,253,251,0.85)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',borderBottom:'1px solid #e8e8e3'}}>
        <div className="max-w-[1280px] mx-auto px-6 py-3.5 flex items-center justify-between gap-6">

              <button className="btn-ghost" onClick={() => setSandboxOpen(true)}
                      style={{borderColor:'#1e5438',color:'#1e5438'}}>

            <div style={{position:'relative'}}>

                <>
                  <div style={{position:'fixed',inset:0,zIndex:30}} onClick={() => setExportMenuOpen(false)} />
                  <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:240,background:'#fff',border:'1px solid #e8e8e3',borderRadius:12,padding:6,boxShadow:'0 12px 32px rgba(10,14,12,0.12)',zIndex:40}}>

              </span>

            </div>

              <span className="stat-value" style={{color: summary.meetsEnergyReq ? '#1e5438' : '#a51e22'}}>

              <div className="flex items-center justify-between">

        </div>
      </aside>

      {/* ─── SANDBOX SLIDE-OVER ─── */}
      <div className={`slideover-overlay ${sandboxOpen ? 'open' : ''}`} onClick={() => setSandboxOpen(false)}></div>
      <aside className={`slideover ${sandboxOpen ? 'open' : ''}`}>
        <div style={{padding:'24px 32px',position:'sticky',top:0,background:'rgba(253,253,251,0.9)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',borderBottom:'1px solid #e8e8e3',display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:1}}>
          <div>
            <div className="label-tiny mb-1">NCC sandbox</div>
            <div className="display-md text-ink">Policy modeling</div>
          </div>
          <button className="btn-icon" onClick={() => setSandboxOpen(false)} aria-label="Close">×</button>
        </div>
        <div style={{padding:'28px 32px'}}>
          {NUI && (
            <NUI.Sandbox
              viperMods={viperMods}
              onChangeMods={setViperMods}
              plan={plan}
              distributionTargets={distributionTargets}
              onChangeTargets={setDistributionTargets}

      </aside>

      {/* ─── PICKERS / MODALS ─── */}
      {editing && (
        <UI.ElectivePicker
          course={editing.course}

      {taggingCourse && (
        <FulfillmentPicker
          course={taggingCourse}

      {/* Print version — full plan in side-by-side template */}

/* ─── AddCourseModal ───────────────────────────────────────────────
   Lightweight modal for adding a new course to a semester. Three
   required fields (code, title, CU). Optional: pick what the course
   fulfills from a curated list, or leave it freeform.

   Designed for the new "user owns the plan" mode. If the user knows
   what they want — even a course not in our data — they type it in
   and it's added. The NCC tracker shows it as "unassigned" until
   they mark a fulfillment.
─────────────────────────────────────────────────────────────────── */
const AddCourseModal = ({ semKey, gradYear, onClose, onAdd }) => {
  const [code, setCode]   = useState('');
  const [title, setTitle] = useState('');
  const [cu, setCu]       = useState(1);
  const [category, setCategory] = useState('gened');
  const [fulfills, setFulfills] = useState([]);
  const [showSuggest, setShowSuggest] = useState(false);
  const D = window.DATA;

  const sem = D.semesterLabel(semKey, gradYear);

  // Suggest matching courses from our catalog as user types
  const suggestions = useMemo(() => {
    if (!code || code.length < 2) return [];
    const upper = code.toUpperCase();
    return Object.entries(D.COURSES)
      .filter(([k, v]) => k.toUpperCase().startsWith(upper) || (v.title || '').toUpperCase().includes(upper))
      .slice(0, 6)
      .map(([k, v]) => ({ code: k, title: v.title, cu: v.cu }));
  }, [code]);

  const FULFILLMENT_OPTIONS = [
    { id: 'ncc-kite',     label: 'Kite Foundation' },
    { id: 'ncc-key',      label: 'Key Foundation' },
    { id: 'ncc-fys',      label: 'First-Year Seminar' },
    { id: 'ncc-writ',     label: 'Writing Foundation' },
    { id: 'ncc-pad',      label: 'P&D Foundation' },
    { id: 'ncc-lang',     label: 'Language Foundation' },
    { id: 'ncc-distrib-n',  label: 'Distribution: Natural Sciences' },
    { id: 'ncc-distrib-ss', label: 'Distribution: Social Sciences' },
    { id: 'ncc-distrib-h',  label: 'Distribution: Humanities' },
    { id: 'seas-ssh',       label: 'SEAS Gen Elective (SS/H)' },
    { id: 'seas-writ',      label: 'SEAS Writing' },
    { id: 'seas-ethics',    label: 'SEAS Ethics' },
    { id: 'major-elective', label: 'Major elective' },
    { id: 'free-elective',  label: 'Free elective' },
  ];

  const toggleFulfillment = (id) => {
    setFulfills(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const useSuggestion = (s) => {
    setCode(s.code);
    setTitle(s.title);
    setCu(s.cu);
    setShowSuggest(false);
  };

  const canSubmit = code.trim() && title.trim() && cu > 0;
  const submit = (e) => {
    e?.preventDefault();
    if (!canSubmit) return;
    onAdd({ code: code.trim(), title: title.trim(), cu: parseFloat(cu) || 1, category, fulfills });
  };

  return (
    <div onClick={onClose}
         style={{position:'fixed',inset:0,background:'rgba(10,14,12,0.30)',zIndex:60,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)'}}>
      <form onSubmit={submit} onClick={e => e.stopPropagation()}
            style={{background:'#fff',borderRadius:'16px',width:'min(520px, 100%)',maxHeight:'85vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(0,0,0,0.18)'}}>
        <div style={{padding:'24px 24px 12px',borderBottom:'1px solid #f0f0eb',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div className="label-tiny mb-1">Add course</div>
            <h3 className="display-md text-ink">to {sem.season}</h3>
          </div>
          <button type="button" onClick={onClose} className="btn-icon" aria-label="Close">×</button>
        </div>

        <div className="scrollable" style={{padding:'18px 24px',flex:1}}>
          <div className="space-y-4">
            <div style={{position:'relative'}}>
              <label className="field-label">Course code</label>
              <input type="text" value={code}
                onChange={e => { setCode(e.target.value); setShowSuggest(true); }}
                onFocus={() => setShowSuggest(true)}
                placeholder="e.g. ECON 0100" autoFocus />
              {showSuggest && suggestions.length > 0 && (
                <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:4,background:'#fff',border:'1px solid #e8e8e3',borderRadius:8,zIndex:10,boxShadow:'0 4px 12px rgba(0,0,0,0.08)',maxHeight:220,overflowY:'auto'}}>
                  {suggestions.map(s => (
                    <button type="button" key={s.code} onClick={() => useSuggestion(s)}
                      style={{display:'block',width:'100%',padding:'8px 12px',textAlign:'left',background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'0.85rem',color:'#0a0e0c'}}
                      onMouseEnter={e => e.currentTarget.style.background = '#f6f6f3'}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <span className="course-code text-forest-500">{s.code}</span>
                      <span className="text-ink" style={{marginLeft:8}}>{s.title}</span>
                      <span className="text-inkSoft" style={{marginLeft:8,fontSize:'0.72rem'}}>{s.cu} CU</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div>
              <label className="field-label">Title</label>
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="Intro to Microeconomics" />
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div>
                <label className="field-label">CU</label>
                <input type="number" step="0.5" min="0.5" max="4" value={cu} onChange={e => setCu(e.target.value)} />
              </div>
              <div>
                <label className="field-label">Category</label>
                <select value={category} onChange={e => setCategory(e.target.value)}>
                  <option value="gened">Gen-ed</option>
                  <option value="sas">BA (College) only</option>
                  <option value="seas">BSE (Engineering) only</option>
                  <option value="both">Both (double-count)</option>
                  <option value="elective">Elective</option>
                </select>
              </div>
            </div>

            <div>
              <label className="field-label">Counts toward (optional)</label>
              <div className="text-xs text-inkSoft mb-2 leading-snug">Tick anything this course fulfills. You can also leave blank and mark fulfillments later.</div>
              <div className="grid grid-cols-2 gap-x-3 gap-y-1.5 text-sm">
                {FULFILLMENT_OPTIONS.map(opt => (
                  <label key={opt.id} className="flex items-center gap-2 cursor-pointer py-0.5">
                    <input type="checkbox" checked={fulfills.includes(opt.id)} onChange={() => toggleFulfillment(opt.id)}
                      style={{accentColor:'#1e5438'}} />
                    <span className="text-ink">{opt.label}</span>
                  </label>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div style={{padding:'14px 24px',borderTop:'1px solid #f0f0eb',display:'flex',justifyContent:'flex-end',gap:'10px'}}>
          <button type="button" className="btn-ghost" onClick={onClose}>Cancel</button>
          <button type="submit" className="btn" disabled={!canSubmit}>Add to {sem.season}</button>
        </div>
      </form>
    </div>
  );
};

/* ─── FulfillmentPicker ─────────────────────────────────────────────
   Lightweight modal to mark what an existing course fulfills.
   Same checkbox grid as AddCourseModal but applied to a course
   already in the plan. Used by the "+ tag" affordance on CourseRow.
─────────────────────────────────────────────────────────────────── */
const FulfillmentPicker = ({ course, currentFulfills, onClose, onToggle }) => {
  const FULFILLMENT_OPTIONS = [
    { id: 'ncc-kite',       label: 'Kite Foundation' },
    { id: 'ncc-key',        label: 'Key Foundation' },
    { id: 'ncc-fys',        label: 'First-Year Seminar' },
    { id: 'ncc-writ',       label: 'Writing Foundation' },
    { id: 'ncc-pad',        label: 'P&D Foundation' },
    { id: 'ncc-lang',       label: 'Language Foundation' },
    { id: 'ncc-distrib-n',  label: 'Distribution: Natural Sciences' },
    { id: 'ncc-distrib-ss', label: 'Distribution: Social Sciences' },
    { id: 'ncc-distrib-h',  label: 'Distribution: Humanities' },
    { id: 'seas-ssh',       label: 'SEAS Gen Elective (SS/H)' },
    { id: 'seas-writ',      label: 'SEAS Writing' },
    { id: 'seas-ethics',    label: 'SEAS Ethics' },
    { id: 'major-elective', label: 'Major elective' },
    { id: 'free-elective',  label: 'Free elective' },
  ];

  return (
    <div onClick={onClose}
         style={{position:'fixed',inset:0,background:'rgba(10,14,12,0.30)',zIndex:60,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)'}}>
      <div onClick={e => e.stopPropagation()}
            style={{background:'#fff',borderRadius:'16px',width:'min(440px, 100%)',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(0,0,0,0.18)'}}>
        <div style={{padding:'22px 24px 14px',borderBottom:'1px solid #f0f0eb',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div className="label-tiny mb-1">Tag what fulfills</div>
            <h3 className="display-md text-ink">{course.code}</h3>
            <div className="text-xs text-inkSoft mt-1 truncate" style={{maxWidth:320}}>{course.title}</div>
          </div>
          <button onClick={onClose} className="btn-icon" aria-label="Close">×</button>
        </div>
        <div className="scrollable" style={{padding:'14px 24px',flex:1}}>
          <div className="text-xs text-inkSoft mb-3 leading-snug">
            Mark any requirements this course satisfies. Changes update the NCC sandbox and trackers immediately.
          </div>
          <div className="space-y-1">
            {FULFILLMENT_OPTIONS.map(opt => {
              const checked = currentFulfills.includes(opt.id);
              return (
                <label key={opt.id}
                       className="flex items-center gap-2.5 cursor-pointer py-1.5 px-2 -mx-2 rounded text-sm"
                       style={{transition:'background 120ms ease'}}
                       onMouseEnter={e => e.currentTarget.style.background = '#f6f6f3'}
                       onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <input type="checkbox" checked={checked}
                    onChange={() => onToggle(course, opt.id)}
                    style={{accentColor:'#1e5438'}} />
                  <span className="text-ink">{opt.label}</span>
                </label>
              );
            })}
          </div>
        </div>
        <div style={{padding:'12px 24px',borderTop:'1px solid #f0f0eb',display:'flex',justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
};

const PrintView = ({ plan, sasMajor, seasMajor, sasConc, seasConc, gradYear }) => (
  <div className="print-only" style={{padding:'24px 32px'}}>
    <h1 className="display-lg" style={{marginBottom:8}}>{sasMajor.code} × {seasMajor.code}</h1>
    <div style={{fontSize:'0.85rem',color:'#5a6b62',marginBottom:24}}>
      {sasMajor.fullName} · {seasMajor.fullName} · Class of {gradYear}
    </div>
    {[1, 2, 3, 4].map(yr => {
      const fk = `fall-y${yr}`, sk = `spring-y${yr}`;
      const fc = plan.semesters[fk] || [];
      const sc = plan.semesters[sk] || [];
      return (
        <div key={yr} style={{marginBottom:18,pageBreakInside:'avoid'}}>
          <div style={{fontFamily:'Fraunces,serif',fontSize:'1.1rem',fontWeight:500,marginBottom:6}}>Year {yr}</div>
          <table style={{width:'100%',fontSize:'0.78rem',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{borderBottom:'1px solid #ccc',textAlign:'left'}}>
                <th style={{padding:'4px 8px',width:'45%'}}>Fall</th><th style={{padding:'4px 8px',width:'5%'}}>CU</th>
                <th style={{padding:'4px 8px',width:'45%'}}>Spring</th><th style={{padding:'4px 8px',width:'5%'}}>CU</th>
              </tr>
            </thead>
            <tbody>
              {Array.from({length: Math.max(fc.length, sc.length)}).map((_, i) => (
                <tr key={i}>
                  <td style={{padding:'3px 8px'}}>{fc[i] ? `${fc[i].code} (${fc[i].title})` : ''}</td>
                  <td style={{padding:'3px 8px'}}>{fc[i]?.cu || ''}</td>
                  <td style={{padding:'3px 8px'}}>{sc[i] ? `${sc[i].code} (${sc[i].title})` : ''}</td>
                  <td style={{padding:'3px 8px'}}>{sc[i]?.cu || ''}</td>
                </tr>
              ))}
              <tr style={{borderTop:'1px solid #ccc',fontWeight:500}}>
                <td style={{padding:'4px 8px'}}>Total</td>
                <td style={{padding:'4px 8px'}}>{fc.reduce((s, c) => s + c.cu, 0).toFixed(1)}</td>
                <td style={{padding:'4px 8px'}}>Total</td>
                <td style={{padding:'4px 8px'}}>{sc.reduce((s, c) => s + c.cu, 0).toFixed(1)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      );
    })}
    <div style={{fontSize:'0.7rem',color:'#5a6b62',marginTop:24}}>Developed by Arjun Sharma · VIPER '28</div>
  </div>
);

// semesterLabel is in scope from the data module (top-level const).

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
